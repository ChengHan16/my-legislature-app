    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script src="./js/dashboard.js"></script>

    <script>        
        document.addEventListener("DOMContentLoaded", async () => {
            // 這裡呼叫的名稱必須跟 main.js 一樣
            await loadLayout('events'); 
            await syncMemberData("班長", "院內活動籌辦", "立法活動辦理");
        });
        document.addEventListener("DOMContentLoaded", async () => {
            await loadLayout('Dashboard'); 
            
            // 監聽 Auth 狀態並抓取 act 集合資料
            firebase.auth().onAuthStateChanged(async (user) => {
                if (user) {
                    // 顯示基本 UID
                    document.getElementById('displayUid').innerText = user.uid;

                    try {
                        const db = firebase.firestore();
                        const doc = await db.collection("act").doc(user.uid).get();
                        
                        if (doc.exists) {
                            const data = doc.data();
                            // 更新名稱與圖片
                            document.getElementById('displayName').innerText = data.displayName || "系統使用者";
                            if (data.photoURL) {
                                document.getElementById('displayAvatar').src = data.photoURL;
                            }
                        } else {
                            document.getElementById('displayName').innerText = "查無此帳號資料";
                        }
                    } catch (error) {
                        console.error("抓取個人資訊失敗:", error);
                    }
                } else {
                    // 未登入處理
                    window.location.href = "login.html";
                }
            });

            await syncMemberData("班長", '<i class="fa-solid fa-calendar-check"></i> 院內活動籌辦', '<i class="fa-solid fa-calendar-check"></i> 立法活動辦理');
        });
        // 選單開關功能
        window.toggleNav = function() {
            const sidebar = document.getElementById("mySidebar");
            const overlay = document.getElementById("overlay");
            if (sidebar.style.width === "250px") {
                sidebar.style.width = "0";
                overlay.style.display = "none";
            } else {
                sidebar.style.width = "250px";
                overlay.style.display = "block";
            }
        };
        // 確保已取得 auth 實例
        const auth = firebase.auth(); 

        function confirmLogout() {
            if (confirm("確定登出系統？")) {
                auth.signOut()
                    .then(() => {
                        alert("已成功登出");
                        window.location.href = "login.html"; // 登出後跳轉至登入頁
                    })
                    .catch((error) => {
                        console.error("登出發生錯誤:", error);
                        alert("登出失敗，請稍後再試");
                    });
            }
        }
        function confirmLogout() { if (confirm("確定登出系統？")) auth.signOut().then(() => window.location.href = "login.html"); }
    </script>
