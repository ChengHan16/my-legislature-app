<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>條款簽署狀況總表 - 立法院系統整合</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="./css/authenticated.css">

    <style>
        :root { 
            --status-ok: #28a745;
            --status-no: #dc3545;
        }
        
        /* 調整主容器，使其適應導覽列下方 */
        .admin-container {
            max-width: 1200px; 
            margin: 40px auto; /* 上下留白 */
            background: #fff; 
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden; 
            border-top: 6px solid var(--ly-blue);
            min-height: 400px; /* 確保有基本高度 */
        }

        .header {
            background: linear-gradient(to right, #003153, #004e80);
            padding: 20px; 
            color: white; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            flex-wrap: wrap; 
            gap: 15px;
        }
        
        .header h1 { 
            margin: 0; 
            font-size: 1.5rem; 
            letter-spacing: 1px;
            /* 繼承 authenticated.css 的字體設定 */
        }

        .stats { 
            font-size: 0.9rem; 
            background: rgba(0,0,0,0.3); 
            padding: 6px 15px; 
            border-radius: 20px; 
            border: 1px solid var(--ly-gold); 
            color: var(--ly-gold);
            white-space: nowrap;
        }

        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        
        th { 
            background: #f8f9fa; 
            color: var(--ly-blue); 
            padding: 15px; 
            text-align: left; 
            font-weight: bold; 
            border-bottom: 2px solid var(--ly-gold); 
            white-space: nowrap; 
        }
        td { 
            padding: 15px; 
            border-bottom: 1px solid #eee; 
            color: #333; 
            font-size: 0.95rem; 
            vertical-align: middle; 
        }
        
        tr:hover { background-color: #fdfdfd; }
        
        /* 狀態標籤 */
        .badge { padding: 6px 12px; border-radius: 30px; font-size: 0.85rem; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }
        .badge.ok { background: rgba(40, 167, 69, 0.1); color: var(--status-ok); border: 1px solid var(--status-ok); }
        .badge.no { background: rgba(220, 53, 69, 0.1); color: var(--status-no); border: 1px solid var(--status-no); }

        .device-info { font-family: 'Courier New', monospace; font-size: 0.9rem; color: #666; word-break: break-all; }
        .ip-addr { font-family: 'Courier New', monospace; color: var(--ly-blue); font-weight: bold; background: #eef2f5; padding: 2px 6px; border-radius: 4px; word-break: break-all; }
        
        .loading { text-align: center; padding: 50px; color: #999; font-size: 1.2rem; }
        
        /* 頭像樣式 */
        .avatar-small { 
            width: 40px; height: 40px; 
            border-radius: 50%; object-fit: cover; 
            border: 2px solid var(--ly-gold); margin-right: 12px; 
            vertical-align: middle; background: #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* --- Mobile Responsive Card View --- */
        @media (max-width: 768px) {
            .admin-container { margin: 20px 10px; } /* 手機版邊距調整 */
            
            .header { flex-direction: column; align-items: flex-start; }
            .header h1 { font-size: 1.3rem; }
            
            thead { display: none; }
            table, tbody, tr, td { display: block; width: 100%; box-sizing: border-box; }
            
            tr {
                margin-bottom: 15px;
                background: #fff;
                border: 1px solid #ddd;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.05);
                overflow: hidden;
            }

            td:first-child {
                background-color: #f8f9fa;
                border-bottom: 2px solid var(--ly-gold);
                padding: 12px 15px;
                text-align: left;
                font-size: 1.1rem;
            }

            td:not(:first-child) {
                padding: 10px 15px;
                border-bottom: 1px solid #eee;
                display: flex;
                justify-content: space-between;
                align-items: center;
                text-align: right;
                font-size: 0.9rem;
            }

            td:not(:first-child):last-child { border-bottom: none; }

            td:not(:first-child)::before {
                content: attr(data-label);
                font-weight: bold;
                color: var(--ly-blue);
                text-transform: uppercase;
                margin-right: 15px;
                font-size: 0.85rem;
                min-width: 80px; 
                text-align: left;
            }
            
            .device-info, .ip-addr { font-size: 0.85rem; max-width: 60%; }
        }
    </style>
</head>
<body>

    <div id="header-layout"></div>

    <div class="admin-container">
        <div class="header">
            <h1><i class="fa-solid fa-file-signature"></i> 系統使用條款簽署總表</h1>
            <div class="stats" id="stats-display">連線中...</div>
        </div>
        
        <div class="table-wrapper">
            <table id="terms-table">
                <thead>
                    <tr>
                        <th width="20%">成員姓名</th>
                        <th width="15%">狀態</th>
                        <th width="20%">簽署時間</th>
                        <th width="25%">登入裝置</th>
                        <th width="20%">來源位址</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="5" class="loading"><i class="fas fa-spinner fa-spin"></i> 正在同步雲端資料庫...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="footer-layout"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <script src="./js/dashboard.js"></script>

    <script>
        // 注意：這裡不需要再執行 firebase.initializeApp，因為 dashboard.js 已經做過了
        // 直接使用 dashboard.js 中定義的全域變數 db (如果 dashboard.js 是在全域定義的話)
        // 為了保險起見，我們再次獲取實例 (Firebase SDK 允許這樣做)
        
        window.onload = async () => {
            // 確保 Firebase 已被 dashboard.js 初始化
            if (!firebase.apps.length) {
                console.warn("Firebase 尚未初始化，等待 dashboard.js...");
                // 這裡通常 dashboard.js 會先跑，但為了安全可以再檢查
            }
            
            const dbInstance = firebase.firestore();
            startRealtimeListener(dbInstance);
        };

        // 啟動即時監聽函式
        async function startRealtimeListener(db) {
            const tbody = document.getElementById('table-body');
            
            try {
                // A. 讀取靜態成員名單
                const userRes = await fetch('users.json');
                if (!userRes.ok) throw new Error("找不到 users.json，請確認檔案位置");
                const usersData = await userRes.json();
                
                // B. 讀取 content 集合取得成員照片
                const imageMap = {};
                try {
                    const contentSnapshot = await db.collection("content").get();
                    contentSnapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.text && data.imageUrl) {
                            imageMap[data.text] = data.imageUrl;
                        }
                    });
                    console.log("照片資料已載入");
                } catch (err) {
                    console.error("照片讀取失敗，將使用預設頭像:", err);
                }

                // C. 對 "T&C" 集合設定即時監聽
                db.collection("T&C").onSnapshot((snapshot) => {
                    
                    const signedMap = {}; 
                    snapshot.forEach(doc => {
                        signedMap[doc.id] = doc.data(); 
                    });

                    // D. 渲染表格
                    renderTableRows(usersData, signedMap, imageMap);

                }, (error) => {
                    console.error("即時監聽失敗:", error);
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red; padding:30px;">
                        <i class="fas fa-exclamation-triangle"></i> 連線中斷<br>
                        <small>${error.message}</small>
                    </td></tr>`;
                });

            } catch (e) {
                console.error(e);
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red; padding:30px;">
                    <i class="fas fa-exclamation-triangle"></i> 初始化錯誤<br>
                    <small>${e.message}</small>
                </td></tr>`;
            }
        }

        // 渲染表格內容的函式
        function renderTableRows(usersData, signedMap, imageMap) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; 
            
            let signedCount = 0;
            const defaultAvatar = "https://fonts.gstatic.com/s/i/googlematerialicons/account_circle/v24/gm_grey-48dp/1x/gm_account_circle_grey_48dp.png";

            usersData.forEach(user => {
                const record = signedMap[user.name]; 
                const isSigned = !!record; 
                if (isSigned) signedCount++;

                const row = document.createElement('tr');
                
                // 決定頭像圖片
                const avatarUrl = (imageMap && imageMap[user.name]) ? imageMap[user.name] : defaultAvatar;

                // 狀態顯示
                const statusHtml = isSigned 
                    ? `<span class="badge ok"><i class="fas fa-check"></i> 已同意</span>` 
                    : `<span class="badge no"><i class="fas fa-times"></i> 未簽署</span>`;

                // 時間顯示
                let timeStr = "--";
                if (record && record.timestamp) {
                    const date = record.timestamp.toDate();
                    timeStr = `${date.getFullYear()}/${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getDate().toString().padStart(2,'0')} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                }

                // 裝置與 IP
                const deviceStr = record ? record.device : '<span style="color:#ccc">---</span>';
                const ipStr = record ? record.ip : '<span style="color:#ccc">---</span>';

                // 產生 HTML，注意：這裡加入了 data-label 屬性以支援手機版 CSS
                row.innerHTML = `
                    <td data-label="成員姓名">
                        <img src="${avatarUrl}" class="avatar-small">
                        <strong>${user.name}</strong>
                    </td>
                    <td data-label="目前狀態">${statusHtml}</td>
                    <td data-label="簽署時間" style="color:#666;">${timeStr}</td>
                    <td data-label="登入裝置" class="device-info">${deviceStr}</td>
                    <td data-label="來源位址"><span class="${record ? 'ip-addr' : ''}">${ipStr}</span></td>
                `;
                tbody.appendChild(row);
            });

            // 更新統計
            document.getElementById('stats-display').innerHTML = 
                `即時監控中：${signedCount} / ${usersData.length} 人`;
        }
        // 選單開關功能
            window.toggleNav = function() {
                const sidebar = document.getElementById("mySidebar");
                const overlay = document.getElementById("overlay");
                if (sidebar.style.width === "250px") {
                    sidebar.style.width = "0";
                    overlay.style.display = "none";
                } else {
                    sidebar.style.width = "250px";
                    overlay.style.display = "block";
                }
            };
            // 確保已取得 auth 實例
            const auth = firebase.auth(); 

            function confirmLogout() {
                if (confirm("確定登出系統？")) {
                    auth.signOut()
                        .then(() => {
                            alert("已成功登出");
                            window.location.href = "login.html"; // 登出後跳轉至登入頁
                        })
                        .catch((error) => {
                            console.error("登出發生錯誤:", error);
                            alert("登出失敗，請稍後再試");
                        });
                }
            }
            function confirmLogout() { if (confirm("確定登出系統？")) auth.signOut().then(() => window.location.href = "login.html"); }
        </script>
</body>
</html>
