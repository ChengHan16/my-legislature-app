    <style>
        /* 【新增】：全域防呆與點擊優化 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { 
            --ly-blue: #003153; 
            --ly-blue-trans: rgba(0, 49, 83, 0.85); 
            --ly-gold: #cfa900;

        /* --- 修正外層容器，確保絕對不產生外側捲軸 --- */
        html, body {
            height: 100dvh !important;
            width: 100vw !important;
            overflow: hidden;
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: 100%; /* 防止 iOS 旋轉時字體自動放大 */
        }

        body { 
            font-family: "Noto Sans TC", sans-serif; 
            background: var(--bg-gray); 
            color: #333;

        /* --- 修復對話清單的手機滑動問題 --- */
        .chat-list {

            -webkit-overflow-scrolling: touch; /* 讓 iOS 手機滑動有慣性且順暢 */
            
            width: 100%;
            max-width: var(--container-width); 
            margin: 0 auto; /* 【關鍵修復】：移除原本的 margin-top，避免撐破 100dvh 的高度計算 */

        }

        .messenger-header {
            /* 強制橫幅不參與 flex 壓縮，確保高度與 Messenger.html 絕對一致 */
            flex: 0 0 auto !important;

        /* 【修改】：導覽列加入頂部安全距離 */

        /* 【修改】：對話清單底部加上安全距離 */
.chat-list {

<body>
    <header class="messenger-header">
        <div class="header-content">
            <div class="user-profile">
                <button class="back-btn" onclick="window.location.href='Dashboard.html'">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <img id="myAvatar" class="user-avatar" src="https://via.placeholder.com/55" alt="Profile">
                <span id="myName" class="user-name">載入中...</span>
            </div>
            <div class="header-actions">
                <button title="新增對話" onclick="startNewChat()"><i class="fas fa-plus"></i></button>
                <button title="建立群組" onclick="createGroup()"><i class="fas fa-users"></i></button>
            </div>
        </div>
    </header>

    <main class="chat-list" id="chatList"></main>

    <button class="fab" onclick="startNewChat()" title="快速發起聊天">
        <i class="fas fa-comment-dots"></i>
    </button>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyACnoimIASfb1rb59SbgLDkUmyYR6ODbUU",
        authDomain: "llwb-ed686.firebaseapp.com",
        projectId: "llwb-ed686",
        storageBucket: "llwb-ed686.firebasestorage.app",
        messagingSenderId: "940345852074",
        appId: "1:940345852074:web:7a30cca5a6d997a92350d3"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const userCache = {};
    const storage = firebase.storage(); // 【新增這行】初始化 Storage
    auth.onAuthStateChanged(user => {
        if (user) {
            db.collection("act").doc(user.uid).get().then(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('myName').innerText = data.displayName || "未設定名稱";
                    document.getElementById('myAvatar').src = data.photoURL || 'https://via.placeholder.com/45';
                }
            });

            db.collection("chats")
                .where("members", "array-contains", user.uid)
                .orderBy("updatedAt", "desc")
                .onSnapshot(snapshot => {
                    renderChatList(snapshot);
                }, error => {
                    console.error("監聽失敗:", error);
                    db.collection("chats")
                        .where("members", "array-contains", user.uid)
                        .get().then(renderChatList);
                });
        } else {
            window.location.href = "login.html";
        }
    });

    // === 2. 渲染對話清單 (包含指定名稱置頂與智慧時間) ===
    async function renderChatList(snapshot, needsManualSort = false) {
        const listElement = document.getElementById('chatList');
        const currentUser = auth.currentUser;
        if (!currentUser) return;

        if (snapshot.empty) {
            listElement.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">暫無對話</p>';
            return;
        }

        // 取得文件陣列
        let docs = snapshot.docs;
        
        // 如果是備用讀取法，在此手動根據時間排序
        if (needsManualSort) {
            docs = docs.sort((a, b) => {
                const timeA = a.data().updatedAt ? a.data().updatedAt.toMillis() : 0;
                const timeB = b.data().updatedAt ? b.data().updatedAt.toMillis() : 0;
                return timeB - timeA;
            });
        }

        // 【核心修改】：分離「立法院 Legislature」與「一般對話」
        const pinnedChats = [];
        const normalChats = [];

        docs.forEach(doc => {
            const chatData = doc.data();
            // 判斷是否為群組，且名稱完全等於「立法院 Legislature」
            if (chatData.isGroup && chatData.groupName === "立法院 Legislature") {
                pinnedChats.push(doc);
            } else {
                normalChats.push(doc);
            }
        });

        // 組合陣列：強制將立法院群組放在第 0 順位 (永遠置頂)
        const sortedDocs = [...pinnedChats, ...normalChats];

        const chatItemsPromises = sortedDocs.map(async (chatDoc) => {
            const chat = chatDoc.data();
            const chatId = chatDoc.id;
            
            let displayTitle = "";
            let displayAvatar = "";
            let avatarStyle = ""; // 用來控制特定頭像大小與間距的變數

            if (chat.isGroup) {
                displayTitle = chat.groupName || "未命名群組";
                displayAvatar = chat.groupAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayTitle)}&background=003153&color=fff`; 
                // 群組維持預設的樣式（55px大小，15px右間距）
            } else {
                const targetUid = chat.members.find(uid => uid !== currentUser.uid);
                if (targetUid && !userCache[targetUid]) {
                    const userDoc = await db.collection("act").doc(targetUid).get();
                    if (userDoc.exists) userCache[targetUid] = userDoc.data();
                }
                const targetData = userCache[targetUid] || { displayName: "未知成員", photoURL: "https://ui-avatars.com/api/?name=User&background=ddd&color=fff" };
                displayTitle = targetData.displayName;
                displayAvatar = targetData.photoURL || "https://ui-avatars.com/api/?name=User&background=ddd&color=fff";
                
                // 【修改】：私訊的頭像除了放大為 60px，並將右側間距縮小為 10px
                avatarStyle = "width: 60px; height: 60px; margin-right: 10px;"; 
            }

            const updatedAt = chat.updatedAt ? chat.updatedAt.toDate() : new Date();
            const myLastRead = (chat.lastReadAt && chat.lastReadAt[currentUser.uid]) 
                               ? chat.lastReadAt[currentUser.uid].toDate() 
                               : new Date(0);

            const isUnread = chat.lastSenderId !== currentUser.uid && updatedAt > myLastRead;
            const unreadClass = isUnread ? "unread" : "";
            
            // 時間顯示邏輯
            let timeStr = "";
            if (chat.updatedAt) {
                const now = new Date();
                const isToday = updatedAt.toDateString() === now.toDateString();
                if (isToday) {
                    timeStr = updatedAt.toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit', hour12: false});
                } else {
                    const y = updatedAt.getFullYear();
                    const m = (updatedAt.getMonth() + 1).toString().padStart(2, '0');
                    const d = updatedAt.getDate().toString().padStart(2, '0');
                    timeStr = `${y}/${m}/${d}`;
                }
            }

            // 立法院小圖釘
            const isPinned = (chat.isGroup && chat.groupName === "立法院 Legislature");
            const pinIcon = isPinned ? '<i class="fas fa-thumbtack" style="color: var(--ly-gold); margin-right: 6px; font-size: 13px; transform: rotate(-45deg);"></i>' : '';

            // 組合 HTML，行內樣式套用 avatarStyle
            return `
                <div class="chat-item ${unreadClass}" onclick="window.location.href='chat.html?id=${chatId}'">
                    <img class="user-avatar" src="${displayAvatar}" alt="Chat" style="${avatarStyle}">
                    <div class="chat-info">
                        <div style="display:flex; justify-content:space-between; align-items:baseline;">
                            <h4>${pinIcon}${displayTitle}</h4>
                            <span class="chat-time">${timeStr}</span>
                        </div>
                        <p>${chat.lastMessage || '尚無訊息'}</p>
                    </div>
                </div>`;
        });

        const chatItemsHtml = await Promise.all(chatItemsPromises);
        listElement.innerHTML = chatItemsHtml.join(""); 
    }

    // --- Modal 控制邏輯 ---
    function openModal(id) {
        document.getElementById(id).style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        if(id === 'newChatModal') document.getElementById('targetUserName').value = '';
    }

    // --- 打開發起新對話視窗並載入單選成員卡片 ---
    async function startNewChat() {
        openModal('newChatModal');
        document.getElementById('targetUserName').value = ''; // 確保打開時清空輸入框

        const listEl = document.getElementById('singleUserList');
        listEl.innerHTML = '<div style="text-align:center; color:#999; padding: 20px;">載入成員中... <i class="fas fa-spinner fa-spin"></i></div>';

        try {
            const currentUser = auth.currentUser;
            const usersSnapshot = await db.collection("act").get();
            let html = '';
            
            usersSnapshot.forEach(doc => {
                // 排除自己
                if (doc.id !== currentUser.uid) {
                    const data = doc.data();
                    const name = data.displayName || '未命名成員';
                    const photo = data.photoURL || 'https://via.placeholder.com/35';
                    
                    // 【關鍵邏輯】：改用 type="radio"，並且加入 onclick 連動下方的輸入框
                    html += `
                    <label class="user-select-item">
                        <input type="radio" name="singleChatUser" value="${name}" onclick="document.getElementById('targetUserName').value = this.value">
                        <div class="user-select-card">
                            <img src="${photo}" alt="avatar">
                            <span>${name}</span>
                        </div>
                    </label>`;
                }
            });
            
            if (!html) html = '<div style="text-align:center; color:#999; padding: 20px;">目前無其他成員</div>';
            listEl.innerHTML = html;
            
        } catch(e) {
            console.error("載入成員失敗:", e);
            listEl.innerHTML = '<div style="text-align:center; color:red; padding: 20px;">載入失敗</div>';
        }
    }

    // --- 核心修正：完整處理開啟對話邏輯 ---
    async function handleStartChat() {
        const targetName = document.getElementById('targetUserName').value.trim();
        if (!targetName) return;

        try {
            const currentUser = auth.currentUser;
            
            // 1. 搜尋使用者
            const userQuery = await db.collection("act")
                .where("displayName", "==", targetName)
                .limit(1)
                .get();

            if (userQuery.empty) {
                alert("找不到該人員，請確認名稱是否正確。");
                return;
            }

            const targetDoc = userQuery.docs[0];
            const targetUid = targetDoc.id;
            const targetData = targetDoc.data();

            if (targetUid === currentUser.uid) {
                alert("系統不支援與個人帳號發起對話。");
                return;
            }

            // 2. 檢查現有對話
            const chatQuery = await db.collection("chats")
                .where("members", "array-contains", currentUser.uid)
                .get();

            let existingChatId = null;
            chatQuery.forEach(doc => {
                const data = doc.data();
                if (data.members && data.members.length === 2 && data.members.includes(targetUid)) {
                    existingChatId = doc.id;
                }
            });

            if (existingChatId) {
                // 已有對話，關閉視窗並跳轉
                closeModal('newChatModal');
                window.location.href = `chat.html?id=${existingChatId}`;
            } else {
                // 3. 建立新對話
                const newChatRef = await db.collection("chats").add({
                    members: [currentUser.uid, targetUid],
                    lastMessage: "剛開啟了對話",
                    lastSenderId: currentUser.uid,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                closeModal('newChatModal');
                window.location.href = `chat.html?id=${newChatRef.id}`;
            }
            
        } catch (error) {
            console.error("開啟失敗:", error);
            alert("開啟對話時發生錯誤。");
        }
    }

    // 打開群組建立視窗並載入成員
    // --- 圖片裁切功能邏輯 ---
    let cropperInstance = null;
    window.croppedAvatarBlob = null; 

    function openCropper(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('cropperImage').src = e.target.result;
                document.getElementById('cropperModal').style.display = 'flex';
                
                if (cropperInstance) cropperInstance.destroy();
                const slider = document.getElementById('cropperZoomSlider');
                
                cropperInstance = new Cropper(document.getElementById('cropperImage'), {
                    aspectRatio: 1, viewMode: 1, dragMode: 'move', autoCropArea: 1,
                    cropBoxMovable: false, cropBoxResizable: false,
                    ready: function () {
                        const imageData = cropperInstance.getImageData();
                        slider.min = imageData.width / imageData.naturalWidth;
                        slider.max = slider.min * 5;
                        slider.value = imageData.ratio;
                    },
                    zoom: function (e) { slider.value = e.detail.ratio; }
                });
            }
            reader.readAsDataURL(file);
        }
        event.target.value = ''; 
    }

    function changeCropperZoom(value) { if (cropperInstance) cropperInstance.zoomTo(parseFloat(value)); }
    function closeCropper() {
        document.getElementById('cropperModal').style.display = 'none';
        if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
    }
    function confirmCrop() {
        if (!cropperInstance) return;
        const canvas = cropperInstance.getCroppedCanvas({ width: 300, height: 300, fillColor: '#fff' });    
        document.getElementById('groupAvatarPreview').src = canvas.toDataURL('image/jpeg');
        canvas.toBlob(function(blob) {
            window.croppedAvatarBlob = blob;
            closeCropper();
        }, 'image/jpeg', 0.85);
    }

    // --- 打開群組建立視窗 (重置圖片狀態) ---
    async function createGroup() {
        openModal('createGroupModal');
        // 【新增】：重置圖片狀態
        document.getElementById('groupAvatarPreview').src = 'https://github.com/ChengHan16/Other_File/blob/master/Legislature/photo/avatar/avatar-default.png?raw=true';
        window.croppedAvatarBlob = null; 

        const listEl = document.getElementById('groupUserList');
        listEl.innerHTML = '<div style="text-align:center; color:#999; padding: 20px;">載入成員中... <i class="fas fa-spinner fa-spin"></i></div>';
        
        try {
            const currentUser = auth.currentUser;
            const usersSnapshot = await db.collection("act").get();
            let html = '';
            usersSnapshot.forEach(doc => {
                if(doc.id !== currentUser.uid) {
                    const data = doc.data();
                    const name = data.displayName || '未命名成員';
                    const photo = data.photoURL || 'https://via.placeholder.com/35';
                    // 【修改】：套用全新的卡片 HTML 結構
                    html += `
                    <label class="user-select-item">
                        <input type="checkbox" value="${doc.id}" class="group-member-checkbox">
                        <div class="user-select-card">
                            <img src="${photo}" alt="avatar">
                            <span>${name}</span>
                        </div>
                    </label>`;
                }
            });
            if(!html) html = '<div style="text-align:center; color:#999; padding: 20px;">目前無其他成員</div>';
            listEl.innerHTML = html;
        } catch(e) {
            console.error("載入成員失敗:", e);
        }
    }

    // --- 建立群組並檢查重複成員 ---
    async function handleCreateGroup() {
        const groupName = document.getElementById('groupNameInput').value.trim();
        if (!groupName) return alert('請為群組取個名稱！');
        
        const checkboxes = document.querySelectorAll('.group-member-checkbox:checked');
        if (checkboxes.length === 0) return alert('請至少選擇一位其他成員加入群組！');
        
        const currentUser = auth.currentUser;
        const members = [currentUser.uid];
        checkboxes.forEach(cb => members.push(cb.value));
        
        const btnConfirm = document.querySelector('#createGroupModal .btn-confirm');
        btnConfirm.innerText = "驗證中...";
        btnConfirm.disabled = true;

        try {
            // 【核心邏輯 1】：檢查是否已經有成員完全相同的群組
            const sortedNewMembers = [...members].sort(); // 將新成員 UID 陣列排序
            
            // 抓取有我在內的所有群組
            const chatsSnapshot = await db.collection("chats")
                .where("isGroup", "==", true)
                .where("members", "array-contains", currentUser.uid)
                .get();
            
            let duplicateChatId = null;
            
            chatsSnapshot.forEach(doc => {
                const existingMembers = doc.data().members || [];
                // 如果人數一樣，且排序後每個 UID 都對應相等，就代表群組一模一樣
                if (existingMembers.length === sortedNewMembers.length) {
                    const sortedExisting = [...existingMembers].sort();
                    const isExactMatch = sortedNewMembers.every((val, index) => val === sortedExisting[index]);
                    if (isExactMatch) duplicateChatId = doc.id;
                }
            });

            /** 若找到重複群組，攔截並直接跳轉**/
            // 若找到重複群組，直接跳轉，不出現確認提示
            if (duplicateChatId) {
                closeModal('createGroupModal');
                window.location.href = `chat.html?id=${duplicateChatId}`;
                return; // 終止建立新群組
            }
            /**
            if (duplicateChatId) {
                alert("系統發現已經有成員完全相同的群組！將為您自動跳轉至該聊天室。");
                closeModal('createGroupModal');
                window.location.href = `chat.html?id=${duplicateChatId}`;
                return; // 終止建立新群組
            }**/

            // 【核心邏輯 2】：若無重複，開始上傳裁切圖片與寫入資料庫
            btnConfirm.innerText = "建立中...";
            let groupAvatarUrl = "";
            
            if (window.croppedAvatarBlob) {
                const tempId = db.collection("chats").doc().id; // 先隨機生一個 ID 當資料夾名稱
                const fileRef = storage.ref(`groupAvatars/${tempId}/${Date.now()}_avatar.jpg`);
                const snapshot = await fileRef.put(window.croppedAvatarBlob);
                groupAvatarUrl = await snapshot.ref.getDownloadURL();
            }

            const newChatData = {
                isGroup: true,
                groupName: groupName,
                members: members,
                lastMessage: "群組已建立，開始聊天吧！",
                lastSenderId: currentUser.uid,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                [`lastReadAt.${currentUser.uid}`]: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (groupAvatarUrl) {
                newChatData.groupAvatar = groupAvatarUrl;
            }

            const newChatRef = await db.collection("chats").add(newChatData);
            
            closeModal('createGroupModal');
            document.getElementById('groupNameInput').value = ''; 
            window.location.href = `chat.html?id=${newChatRef.id}`;
            
        } catch(e) {
            console.error("建立群組失敗:", e);
            alert('建立群組失敗，請稍後重試。');
        } finally {
            btnConfirm.innerText = "建立群組";
            btnConfirm.disabled = false;
        }
    }
</script>

    <div id="newChatModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-comment-medical"></i> 發起新對話</h3>
                <span style="cursor:pointer;" onclick="closeModal('newChatModal')">&times;</span>
            </div>
            <div class="modal-body">
                <div class="modal-input-group">
                    <label>選擇對象 (從系統資料庫)</label>
                    <div id="singleUserList" class="user-select-list">
                        <div style="text-align:center; color:#999; padding: 20px;">載入成員中...</div>
                    </div>
                </div>
                <div class="modal-input-group">
                    <label>手動輸入或確認對象名稱</label>
                    <input type="text" id="targetUserName" placeholder="請輸入對方的名稱...">
                </div>
                <p style="font-size: 12px; color: #888; margin-top: -10px;">* 點擊上方卡片會自動填入，或可直接手動輸入名稱</p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-cancel" onclick="closeModal('newChatModal')">取消</button>
                <button class="btn-modal btn-confirm" onclick="handleStartChat()">確認開啟</button>
            </div>
        </div>
    </div>

    <div id="createGroupModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-users"></i> 建立群組聊天</h3>
                <span style="cursor:pointer;" onclick="closeModal('createGroupModal')">&times;</span>
            </div>
            <div class="modal-body">
                <div class="modal-input-group" style="text-align: center;">
                    <label>群組頭像</label>
                    <input type="file" id="groupAvatarInput" accept="image/*" style="display: none;" onchange="openCropper(event)">
                    <div class="avatar-edit-wrapper" onclick="document.getElementById('groupAvatarInput').click()">
                        <img id="groupAvatarPreview" class="group-avatar-preview" src="https://github.com/ChengHan16/Other_File/blob/master/Legislature/photo/avatar/avatar-default.png?raw=true">
                        <div class="avatar-edit-icon"><i class="fas fa-pencil-alt"></i></div>
                    </div>
                </div>

                <div class="modal-input-group">
                    <label>群組名稱</label>
                    <input type="text" id="groupNameInput" placeholder="請輸入群組名稱...">
                </div>
                <div class="modal-input-group">
                    <label>選擇成員 (從系統資料庫)</label>
                    <div id="groupUserList" class="user-select-list">
                        <div style="text-align:center; color:#999; padding: 20px;">載入成員中...</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-cancel" onclick="closeModal('createGroupModal')">取消</button>
                <button class="btn-modal btn-confirm" onclick="handleCreateGroup()">建立群組</button>
            </div>
        </div>
    </div>

    <div id="cropperModal" class="modal-overlay" style="z-index: 4000;">
        <div class="modal-card" style="max-width: 450px;">
            <div class="modal-header">
                <h3><i class="fas fa-crop-alt"></i> 調整圖片位置與大小</h3>
                <span style="cursor:pointer;" onclick="closeCropper()">&times;</span>
            </div>
            <div class="modal-body" style="padding: 15px; background: #111; display: flex; align-items: center; gap: 15px;">
                <div style="height: 300px; flex: 1; overflow: hidden; background: #000; border-radius: 8px;">
                    <img id="cropperImage" src="" style="max-width: 100%; display: block;">
                </div>
                <div class="zoom-slider-container">
                    <i class="fas fa-search-plus zoom-icon"></i>
                    <input type="range" id="cropperZoomSlider" min="0.1" max="3" step="0.01" value="1" orient="vertical" oninput="changeCropperZoom(this.value)">
                    <i class="fas fa-search-minus zoom-icon"></i>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-cancel" onclick="closeCropper()">取消</button>
                <button class="btn-modal btn-confirm" onclick="confirmCrop()">確認裁切</button>
            </div>
        </div>
    </div>
    </body>
</html>
