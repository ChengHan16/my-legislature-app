<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>立法院 - 系統登入</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- 基礎設定 --- */
        /* 【關鍵修改】：加入防呆與 iOS 字體縮放限制 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 請在所有的 HTML 檔案中尋找 html, body 的設定，修改成這樣： */
html, body {
    margin: 0; padding: 0;
    width: 100vw !important;
    height: 100vh !important; /* 【新增這行】：給舊版 iOS 的保命符 */
    height: 100dvh !important; /* 支援的新版 iOS 會自動覆蓋上一行 */
    overflow: hidden; 
    -webkit-text-size-adjust: 100%;
}

        body { 
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            
            /* --- 關鍵修改：預設隱藏整個 body --- */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease;
        }

        /* 當 Firebase 確認未登入時，加上這個 class 來顯示畫面 */
        body.auth-resolved {
            opacity: 1;
            visibility: visible;
        }

        /* --- 桌面版容器 --- */
        .login-wrapper { 
            max-width: 450px; 
            width: 100%; 
            background-color: #fff; 
            padding: 50px 40px; 
            border-radius: 8px; /* 稍微增加圓角讓視覺更柔和 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        /* --- 標題設計 --- */
        .brand-logo { 
            color: #003153; 
            font-size: 28px; 
            margin-bottom: 5px; 
            font-weight: bold;
            letter-spacing: 2px;
        }
        .accent-line {
            width: 40px;
            height: 4px;
            background-color: #b8860b; 
            margin: 15px auto 35px auto;
            border-radius: 2px;
        }

        /* --- 表單控制 --- */
        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }
        .input-container {
            position: relative;
        }
        .input-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        input { 
            width: 100%;
            padding: 12px 15px 12px 45px;
            font-size: 16px; /* 必須為 16px，防止 iOS 點擊輸入框時畫面自動放大 */
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fcfcfc;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #003153; box-shadow: 0 0 0 2px rgba(0,49,83,0.1); background-color: #fff; }

        /* --- 按鈕樣式 --- */
        .login-btn { 
            width: 100%;
            padding: 14px;
            background-color: #003153;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s, transform 0.1s;
        }
        .login-btn:hover { background-color: #00233b; }
        .login-btn:active { transform: scale(0.98); }

        #msg { height: 20px; margin-top: 15px; font-size: 14px; font-weight: 500; }

        .footer-text {
            font-size: 12px; 
            color: #aaa; 
            text-align: center;
            margin-top: 40px;
        }

        /* --- 行動裝置適應 (RWD) --- */
        @media (max-width: 600px) {
            body { 
                background-color: #fff; 
                align-items: flex-start; /* 讓內容靠上，避免鍵盤擋住 */
            }
            .login-wrapper { 
                max-width: none; 
                width: 100%; 
                /* 【關鍵修改】：不寫死 height: 100vh，改用 min-height 保留滾動空間 */
                min-height: 100dvh; 
                /* 【關鍵修改】：加入 iOS 安全距離，避開動態島與底線 */
                padding: calc(40px + env(safe-area-inset-top)) 30px calc(20px + env(safe-area-inset-bottom)) 30px; 
                box-shadow: none; 
                border-radius: 0; 
            }
            .brand-logo { font-size: 32px; margin-top: 10px; }
            .login-btn { padding: 16px; font-size: 18px; } 
            
            /* 將版權文字自動推到畫面最底部 */
            .footer-text { margin-top: auto; padding-top: 30px; }
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div style="flex-shrink: 0;">
        <div class="brand-logo"><i class="fas fa-landmark"></i> 立法院</div>
        <div class="accent-line"></div>
        
        <div style="color:#666; margin-bottom: 30px; font-size: 14px; letter-spacing: 1px;">
            ADMINISTRATION SYSTEM
        </div>
    </div>

    <div style="flex-shrink: 0;">
        <div class="form-group">
            <label>帳號 (Email)</label>
            <div class="input-container">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="請輸入公務帳號" autocomplete="email">
            </div>
        </div>

        <div class="form-group">
            <label>密碼 (Password)</label>
            <div class="input-container">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="請輸入密碼" autocomplete="current-password">
            </div>
        </div>

        <button id="loginBtn" class="login-btn">進入管理系統</button>
        <p id="msg"></p>
    </div>

    <div class="footer-text">
        © 2026 立法院 Legislature. All rights reserved.
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACnoimIASfb1rb59SbgLDkUmyYR6ODbUU",
        authDomain: "llwb-ed686.firebaseapp.com",
        projectId: "llwb-ed686",
        storageBucket: "llwb-ed686.firebasestorage.app",
        messagingSenderId: "940345852074",
        appId: "1:940345852074:web:7a30cca5a6d997a92350d3"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 【新增防呆機制】：如果 Firebase 在 iOS WKWebView 因為協議問題卡住，2 秒後強制顯示登入畫面
    const fallbackTimer = setTimeout(() => {
        document.body.classList.add("auth-resolved");
        console.warn("Firebase 載入逾時，強制顯示畫面");
    }, 2000);

    // 檢查登入狀態
    auth.onAuthStateChanged((user) => {
        clearTimeout(fallbackTimer); // Firebase 成功回應，解除防呆計時器

        if (user) {
            window.location.replace("IOS-Messenger.html");
        } else {
            document.body.classList.add("auth-resolved");
        }
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('msg');

        if (!email || !password) {
            msg.innerText = "請完整填寫憑證資訊";
            msg.style.color = "#a94442";
            return;
        }

        msg.innerText = "安全驗證中...";
        msg.style.color = "#003153";

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.style.opacity = "0.7";

        auth.signInWithEmailAndPassword(email, password)
            .then(() => {
                // 登入成功後跳轉也使用 replace
                window.location.replace("Dashboard.html");
            })
            .catch((error) => {
                msg.style.color = "#a94442";
                msg.innerText = "驗證失敗，請檢查輸入資訊";
                btn.disabled = false;
                btn.style.opacity = "1";
            });
    });
</script>
</body>
</html>
