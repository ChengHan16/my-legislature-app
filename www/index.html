<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>立法院 - 系統登入</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- 基礎設定 --- */
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            
            /* --- 關鍵修改：預設隱藏整個 body --- */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease;
        }

        /* 當 Firebase 確認未登入時，加上這個 class 來顯示畫面 */
        body.auth-resolved {
            opacity: 1;
            visibility: visible;
        }

        /* --- 桌面版容器 --- */
        .login-wrapper { 
            max-width: 450px; 
            width: 100%; 
            background-color: #fff; 
            padding: 50px 40px; 
            border-radius: 2px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* --- 標題設計 --- */
        .brand-logo { 
            color: #003153; 
            font-size: 28px; 
            margin-bottom: 5px; 
            font-weight: bold;
            letter-spacing: 2px;
        }
        .accent-line {
            width: 40px;
            height: 4px;
            background-color: #b8860b; 
            margin: 15px auto 35px auto;
        }

        /* --- 表單控制 --- */
        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }
        .input-container {
            position: relative;
        }
        .input-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        input { 
            width: 100%;
            padding: 12px 15px 12px 45px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 2px;
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #003153; box-shadow: 0 0 0 2px rgba(0,49,83,0.1); }

        /* --- 按鈕樣式 --- */
        .login-btn { 
            width: 100%;
            padding: 14px;
            background-color: #003153;
            color: white;
            border: none;
            border-radius: 2px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .login-btn:hover { background-color: #00233b; }
        .login-btn:active { transform: scale(0.99); }

        #msg { height: 20px; margin-top: 15px; font-size: 14px; font-weight: 500; }

        /* --- 行動裝置適應 (RWD) --- */
        @media (max-width: 600px) {
            body { 
                background-color: #fff; 
                align-items: flex-start; 
            }
            .login-wrapper { 
                max-width: none; 
                width: 100%; 
                height: 100vh; 
                padding: 60px 30px; 
                box-shadow: none; 
                border-radius: 0; 
                border: none;
            }
            .brand-logo { font-size: 32px; margin-top: 20px; }
            .login-btn { padding: 18px; font-size: 18px; } 
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="brand-logo"><i class="fas fa-landmark"></i> 立法院</div>
    <div class="accent-line"></div>
    
    <div style="color:#666; margin-bottom: 30px; font-size: 14px; letter-spacing: 1px;">
        ADMINISTRATION SYSTEM
    </div>

    <div class="form-group">
        <label>帳號 (Email)</label>
        <div class="input-container">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="請輸入公務帳號" autocomplete="email">
        </div>
    </div>

    <div class="form-group">
        <label>密碼 (Password)</label>
        <div class="input-container">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="請輸入密碼" autocomplete="current-password">
        </div>
    </div>

    <button id="loginBtn" class="login-btn">進入管理系統</button>
    
    <p id="msg"></p>

    <div style="margin-top: 40px; font-size: 12px; color: #aaa; text-align: center;">
        © 2026 立法院 Legislature. All rights reserved.
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACnoimIASfb1rb59SbgLDkUmyYR6ODbUU",
        authDomain: "llwb-ed686.firebaseapp.com",
        projectId: "llwb-ed686",
        storageBucket: "llwb-ed686.firebasestorage.app",
        messagingSenderId: "940345852074",
        appId: "1:940345852074:web:7a30cca5a6d997a92350d3"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 檢查登入狀態 (統一集中在這裡處理跳轉)
    auth.onAuthStateChanged((user) => {
        if (user) {
            // 【關鍵修改】：加上 ./ 確保 iOS WebView 能正確找到本地檔案
            // 請決定你要跳轉到 Messenger 還是 Dashboard，這裡以 Messenger 為例
            window.location.replace("./Messenger.html"); 
        } else {
            document.body.classList.add("auth-resolved");
        }
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('msg');

        if (!email || !password) {
            msg.innerText = "請完整填寫憑證資訊";
            msg.style.color = "#a94442";
            return;
        }

        msg.innerText = "安全驗證中...";
        msg.style.color = "#003153";

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.style.opacity = "0.7";

        auth.signInWithEmailAndPassword(email, password)
            .then(() => {
                // 【關鍵修改】：這裡留空！不要在這裡執行跳轉。
                // 登入成功後，Firebase 會自動觸發上方的 onAuthStateChanged，由那邊統一跳轉。
            })
            .catch((error) => {
                msg.style.color = "#a94442";
                // 【關鍵修改】：將具體的錯誤代碼印在畫面上，方便你在手機上除錯
                msg.innerText = "驗證失敗：" + error.code; 
                btn.disabled = false;
                btn.style.opacity = "1";
            });
    });
</script>
</body>
</html>
