<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>立法院 - 系統登入</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- 基礎設定與阻擋全域選取 --- */
        * { 
            box-sizing: border-box; 
            /* 阻擋 iOS 長按跳出選單 */
            -webkit-touch-callout: none !important; 
            /* 阻擋全域文字選取 */
            -webkit-user-select: none !important; 
            user-select: none !important; 
            /* 移除點擊時的藍色半透明高光 */
            -webkit-tap-highlight-color: transparent; 
        }

        /* 👑 特例：只允許 input 欄位可以輸入與複製文字 */
        input { 
            -webkit-user-select: auto !important; 
            user-select: auto !important; 
        }
        
        body { 
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        /* --- 關鍵修改：將隱藏效果移到登入框上 --- */
        .login-wrapper, .reset-wrapper { 
            max-width: 450px; 
            width: 100%; 
            background-color: #fff; 
            padding: 50px 40px; 
            border-radius: 2px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .login-wrapper {
            /* 預設隱藏表單，等待 Firebase 驗證 */
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px);
            transition: all 0.4s ease;
        }

        /* 當 Firebase 確認未登入時顯示表單 */
        .login-wrapper.auth-resolved {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* --- 標題設計 --- */
        .brand-logo { 
            color: #003153; 
            font-size: 28px; 
            margin-bottom: 5px; 
            font-weight: bold;
            letter-spacing: 2px;
        }
        .accent-line {
            width: 40px;
            height: 4px;
            background-color: #b8860b; 
            margin: 15px auto 35px auto;
        }

        /* --- 表單控制 --- */
        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }
        .input-container {
            position: relative;
        }
        .input-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        input { 
            width: 100%;
            padding: 12px 15px 12px 45px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 2px;
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #003153; box-shadow: 0 0 0 2px rgba(0,49,83,0.1); }

        /* --- 按鈕樣式 --- */
        .login-btn { 
            width: 100%;
            padding: 14px;
            background-color: #003153;
            color: white;
            border: none;
            border-radius: 2px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .login-btn:hover { background-color: #00233b; }
        .login-btn:active { transform: scale(0.99); }

        #msg { height: 20px; margin-top: 15px; font-size: 14px; font-weight: 500; }

        /* --- 行動裝置適應 (RWD) --- */
        @media (max-width: 600px) {
            body { 
                background-color: #fff; 
                align-items: flex-start; 
            }
            .login-wrapper, .reset-wrapper { 
                max-width: none; 
                width: 100%; 
                height: 100vh; 
                padding: 60px 30px; 
                box-shadow: none; 
                border-radius: 0; 
                border: none;
            }
            .brand-logo { font-size: 32px; margin-top: 20px; }
            .login-btn { padding: 18px; font-size: 18px; } 
        }

        /* --- 初始載入動畫 (Splash Screen) --- */
        #splashScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .splash-text {
            color: #003153;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            animation: pulse-scale 1.5s infinite alternate ease-in-out;
        }
        @keyframes pulse-scale {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.1); opacity: 1; }
        }
        
    </style>
</head>
<body>
<div id="splashScreen">
    <div class="splash-text"><i class="fas fa-landmark"></i> 立法院 Legislature</div>
</div>

<div id="loadingOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 9999; flex-direction: column; justify-content: center; align-items: center;">
    <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: #003153; margin-bottom: 20px;"></i>
    <span style="color: #003153; font-size: 1.1rem; font-weight: bold; letter-spacing: 1px;">安全連線中，準備進入系統...</span>
</div>
    
<div class="login-wrapper">
    <div class="brand-logo"><i class="fas fa-landmark"></i> 立法院</div>
    <div class="accent-line"></div>
    
    <div style="color:#666; margin-bottom: 30px; font-size: 14px; letter-spacing: 1px;">
        ADMINISTRATION SYSTEM
    </div>

    <div class="form-group">
        <label>帳號 (Email)</label>
        <div class="input-container">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="請輸入公務帳號" autocomplete="email">
        </div>
    </div>

    <div class="form-group">
        <label>密碼 (Password)</label>
        <div class="input-container">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="請輸入密碼" autocomplete="current-password">
        </div>
    </div>

    <button id="loginBtn" class="login-btn">進入管理系統</button>
    
    <div style="margin-top: 15px; text-align: center;">
        <a href="#" id="showResetBtn" style="color: #666; font-size: 14px; text-decoration: none; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#003153'" onmouseout="this.style.color='#666'">忘記密碼？</a>
    </div>
    
    <p id="msg"></p>

    <div style="margin-top: 40px; font-size: 12px; color: #aaa; text-align: center;">
        © 2026 立法院 Legislature. All rights reserved.
    </div>
</div>

<div class="reset-wrapper" style="display: none;">
    <div class="brand-logo"><i class="fas fa-key"></i> 重設密碼</div>
    <div class="accent-line"></div>
    
    <div style="color:#666; margin-bottom: 25px; font-size: 14px; letter-spacing: 1px;">
        請輸入您的公務信箱以接收重設連結
    </div>

    <div class="form-group">
        <label>帳號 (Email)</label>
        <div class="input-container">
            <i class="fas fa-envelope"></i>
            <input type="email" id="resetEmail" placeholder="請輸入公務帳號">
        </div>
    </div>

    <button id="sendResetBtn" class="login-btn">發送重設信件</button>
    <button id="backToLoginBtn" class="login-btn" style="background-color: #f0f2f5; color: #444; border: 1px solid #ddd; margin-top: 10px; box-shadow: none;">返回登入</button>
    
    <p id="resetMsg" style="height: 20px; margin-top: 15px; font-size: 14px; font-weight: 500;"></p>

    <div style="margin-top: 20px; font-size: 13px; color: #d93025; text-align: left; background: #fce8e6; padding: 12px; border-radius: 6px; line-height: 1.6; border: 1px solid #fad2cf;">
        <i class="fas fa-exclamation-triangle"></i> <strong>請注意：</strong><br>重新設定密碼郵件為全英文，有可能會在信箱的「垃圾郵件」當中，請注意尋找。
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACnoimIASfb1rb59SbgLDkUmyYR6ODbUU",
        authDomain: "llwb-ed686.firebaseapp.com",
        projectId: "llwb-ed686",
        storageBucket: "llwb-ed686.firebasestorage.app",
        messagingSenderId: "940345852074",
        appId: "1:940345852074:web:7a30cca5a6d997a92350d3"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const loginWrapper = document.querySelector('.login-wrapper');
    const msgEl = document.getElementById('msg');
    let isNavigating = false;

    function navigateToApp() {
        if (isNavigating) return;
        isNavigating = true;
        msgEl.innerText = "登入成功！正在進入系統...";
        msgEl.style.color = "#003153";

        document.querySelector('.login-wrapper').style.display = 'none';
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        setTimeout(() => { 
            window.location.replace("./Messenger.html"); 
        }, 300);
    }

    function showLoginForm() {
        const splash = document.getElementById('splashScreen');
        splash.style.opacity = '0';
        setTimeout(() => { splash.style.visibility = 'hidden'; }, 500);
        loginWrapper.classList.add("auth-resolved");
    }

    const fallbackTimer = setTimeout(() => { showLoginForm(); }, 3000);

    auth.onAuthStateChanged((user) => {
        clearTimeout(fallbackTimer); 
        if (user) { 
            navigateToApp(); 
        } 
        else { 
            showLoginForm(); 
        }
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            msgEl.innerText = "請完整填寫憑證資訊";
            msgEl.style.color = "#a94442";
            return;
        }

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.style.opacity = "0.7";

        msgEl.innerText = "[1/3] 準備連線 (03.07-C)...";
        msgEl.style.color = "#003153";

        auth.signInWithEmailAndPassword(email, password)
            .then(async (userCredential) => {
                const user = userCredential.user;
                const token = await user.getIdToken(); 
                localStorage.setItem("token", token);
                navigateToApp();
            })
            .catch((error) => {
                msgEl.style.color = "#a94442";
                msgEl.innerText = "失敗: " + error.code; 
                btn.disabled = false;
                btn.style.opacity = "1";
                isNavigating = false; 
            });

        setTimeout(() => {
            if (!isNavigating && msgEl.innerText.includes("[1/3]")) {
                msgEl.innerText = "[2/3] 請求已送出，等待 Google...";
            }
        }, 500);
    });

    // ==========================================
    // 忘記密碼系統邏輯
    // ==========================================
    const showResetBtn = document.getElementById('showResetBtn');
    const backToLoginBtn = document.getElementById('backToLoginBtn');
    const resetWrapper = document.querySelector('.reset-wrapper');
    const sendResetBtn = document.getElementById('sendResetBtn');
    const resetMsg = document.getElementById('resetMsg');

    showResetBtn.addEventListener('click', (e) => {
        e.preventDefault();
        loginWrapper.style.display = 'none'; 
        resetWrapper.style.display = 'block'; 
        document.getElementById('resetEmail').value = document.getElementById('email').value;
        resetMsg.innerText = '';
    });

    backToLoginBtn.addEventListener('click', (e) => {
        e.preventDefault();
        resetWrapper.style.display = 'none';
        loginWrapper.style.display = 'block';
    });

    sendResetBtn.addEventListener('click', () => {
        const resetEmail = document.getElementById('resetEmail').value.trim();
        
        if (!resetEmail) {
            resetMsg.innerText = "請輸入信箱";
            resetMsg.style.color = "#a94442";
            return;
        }

        if (!confirm(`確認是否重新設定密碼？\n\n系統將發送重設信件至：\n${resetEmail}`)) {
            return; 
        }

        sendResetBtn.disabled = true;
        sendResetBtn.style.opacity = "0.7";
        resetMsg.innerText = "正在檢查帳號資料...";
        resetMsg.style.color = "#003153";

        // 【新增】：先檢查 Authentication 是否有該帳號
        auth.fetchSignInMethodsForEmail(resetEmail)
            .then((signInMethods) => {
                // 如果回傳的陣列是空的，代表該信箱尚未在 Authentication 註冊
                if (signInMethods.length === 0) {
                    resetMsg.innerText = "找不到此帳號，請確認信箱是否輸入正確。";
                    resetMsg.style.color = "#a94442";
                    sendResetBtn.disabled = false;
                    sendResetBtn.style.opacity = "1";
                    return;
                }

                // 帳號存在，更新提示並進行寄送
                resetMsg.innerText = "帳號確認無誤，信件發送中...";
                
                return auth.sendPasswordResetEmail(resetEmail).then(() => {
                    resetMsg.innerText = "發送成功！請前往信箱收信。";
                    resetMsg.style.color = "#28a745";
                    sendResetBtn.disabled = false;
                    sendResetBtn.style.opacity = "1";
                    document.getElementById('resetEmail').value = ''; 
                });
            })
            .catch((error) => {
                let errorText = error.message;
                // 相容舊版 Firebase 錯誤碼
                if (error.code === 'auth/user-not-found') errorText = "找不到此帳號，請確認輸入是否正確。";
                if (error.code === 'auth/invalid-email') errorText = "信箱格式不正確。";
                
                resetMsg.innerText = "操作失敗：" + errorText;
                resetMsg.style.color = "#a94442";
                sendResetBtn.disabled = false;
                sendResetBtn.style.opacity = "1";
            });
    });
</script>
</body>
</html>
