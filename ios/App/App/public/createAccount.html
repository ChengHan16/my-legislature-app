<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>建立帳號 - Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    
    <style>
        .signup-container { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>

<div class="signup-container">
    <h2>註冊新帳號</h2>
    <div class="form-group">
        <label>電子信箱 (登入用)</label>
        <input type="email" id="email" required>
    </div>
    <div class="form-group">
        <label>顯示名稱 (對外顯示)</label>
        <input type="text" id="displayName" required>
    </div>
    <div class="form-group">
        <label>密碼</label>
        <input type="password" id="password" required>
    </div>
    <div class="form-group">
        <label>確認密碼</label>
        <input type="password" id="confirmPassword" required>
    </div>
    <div class="form-group">
        <label>上傳頭像</label>
        <input type="file" id="photoFile" accept="image/*">
    </div>
    <button id="signupBtn">立即註冊</button>
    <p id="message" style="color: red;"></p>
</div>

<script>
    // 1. 初始化 Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyACnoimIASfb1rb59SbgLDkUmyYR6ODbUU",
        authDomain: "llwb-ed686.firebaseapp.com",
        projectId: "llwb-ed686",
        storageBucket: "llwb-ed686.firebasestorage.app",
        messagingSenderId: "940345852074",
        appId: "1:940345852074:web:7a30cca5a6d997a92350d3"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    // 2. 註冊邏輯
    document.getElementById('signupBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const displayName = document.getElementById('displayName').value;
        const file = document.getElementById('photoFile').files[0];
        const message = document.getElementById('message');

        // 基本驗證
        if (password !== confirmPassword) {
            message.innerText = "密碼與確認密碼不符！";
            return;
        }
        if (!file) {
            message.innerText = "請上傳圖片。";
            return;
        }

        try {
            // 禁用按鈕防止重複點擊
            document.getElementById('signupBtn').disabled = true;
            message.style.color = "blue";
            message.innerText = "註冊中，請稍候...";

            // A. 建立 Auth 帳號
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // B. 上傳圖片到 Storage
            const storageRef = storage.ref(`avatars/${user.uid}/${file.name}`);
            const uploadTask = await storageRef.put(file);
            const photoURL = await uploadTask.ref.getDownloadURL();

            // C. 將詳細資料存入 Firestore 的 "act" 集合
            await db.collection("act").doc(user.uid).set({
                uid: user.uid,
                email: email,
                displayName: displayName,
                photoURL: photoURL,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // D. 更新 Auth Profile (非必要，但建議同步)
            await user.updateProfile({
                displayName: displayName,
                photoURL: photoURL
            });

            message.style.color = "green";
            message.innerText = "註冊成功！正在導向首頁...";
            
            // 註冊成功後的跳轉 (例如到 home.html)
            window.location.href = "login.html";

        } catch (error) {
            message.style.color = "red";
            message.innerText = "錯誤: " + error.message;
            document.getElementById('signupBtn').disabled = false;
        }
    });
</script>

</body>
</html>
