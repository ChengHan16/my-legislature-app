<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎來到立法院</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/authenticated.css">
    
    <style>
        /* --- 2. 活動詳情 Banner 樣式 --- */
        .banner-info-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            font-size: 1.1em;
            color: #ffcc00;
        }

        /* --- 3. 主要內容區域 --- */
        .event-content-area {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1;
        }

        .org-image-container { text-align: center; margin-bottom: 50px; }
        .org-logo {
            width: 180px; height: 180px; border-radius: 50%;
            border: 6px solid white; box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            object-fit: cover;
        }

        .info-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            border-left: 6px solid #ffcc00;
        }

        /* 活動網格與溢出處理 */
        .events-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            width: 100%; /* 確保容器不溢出 */
        }

        .event-card-link {
            text-decoration: none;
            color: inherit;
            display: block;
            width: 450px; 
            max-width: 100%; /* 關鍵：確保卡片不超過手機螢幕寬度 */
            box-sizing: border-box;
        }

        .event-card-simple {
            display: flex;
            align-items: center;
            background-color: white;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-left: 6px solid #ffcc00;
            transition: transform 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
            width: 100%;
        }

        .event-card-link:hover .event-card-simple {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(26, 35, 126, 0.1);
        }

        .event-date-circle {
            flex-shrink: 0;
            width: 65px;
            height: 65px;
            background-color: #1a237e;
            color: #ffcc00;
            border-radius: 50%;
            text-align: center;
            margin-right: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-weight: bold;
            border: 2px solid #ffcc00;
        }

        .event-date-circle .day { font-size: 1.6em; line-height: 1; }
        .event-date-circle .month { font-size: 0.75em; margin-top: 2px; }

        .event-info-box {
            flex-grow: 1;
            min-width: 0;
        }

        .event-info-box h3 {
            color: #1a237e;
            font-size: 1.4em;
            margin: 0 0 8px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-info-box .date-text {
            font-size: 0.95em;
            color: #666;
            margin: 0;
        }

        .action-arrow {
            font-size: 1.2em;
            color: #1a237e;
            margin-left: 15px;
            opacity: 0.5;
            transition: 0.3s;
            flex-shrink: 0;
        }

        /* =============================================
           響應式優化 (手機版 768px 以下)
           ============================================= */
        /* --- 5. RWD 響應式調整 --- */
        @media (max-width: 900px) {
            .navbar-full {
                flex-direction: column;
                padding: 15px 20px;
            }
            .nav-links {
                margin-top: 10px;
            }
            .nav-links li {
                margin: 0 10px;
            }
            .member-list {
                padding: 40px 20px;
            }
        }

        @media (max-width: 600px) {
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-links li {
                margin-bottom: 5px;
            }
            .member-item {
                width: 140px; /* 手機上縮小卡片寬度 */
            }
            .member-image-wrapper {
                width: 100px; /* 手機上縮小圖片 */
                height: 100px;
            }
        }

        @media (max-width: 768px) {
            /* 1. 調整導覽列外殼，縮小內距 */
            .navbar-full { 
                flex-direction: column; 
                padding: 10px 5px; 
            }

            /* 2. 調整導覽連結容器 */
            .nav-links { 
                margin-top: 10px; 
                width: 100%; 
                justify-content: center; /* 置中 */
                display: flex;
                flex-wrap: nowrap;      /* 關鍵：強制絕對不換行 */
                padding: 12px 0 5px 0;
                border-top: 1px solid rgba(255,255,255,0.1);
            }

            /* 3. 調整清單項目 */
            .nav-links li { 
                margin: 0 4px;          /* 縮小項目間的間距 */
                flex-shrink: 1;         /* 允許項目在必要時縮小 */
            }

            /* 4. 調整文字大小與行為 */
            .nav-links a { 
                padding: 5px 8px;       /* 縮小按鈕內距 */
                
                /* 使用 clamp 讓字體在 12px 到 14px 之間隨螢幕自動縮放 */
                font-size: clamp(12px, 3.2vw, 14px); 
                
                white-space: nowrap;    /* 關鍵：文字絕對不換行 */
                letter-spacing: -0.5px; /* 稍微縮小字距，節省空間 */
            }

            .member-item {
                width: 120px; /* 手機上縮小卡片寬度 */
            }
            .member-image-wrapper {
                width: 100px; /* 手機上縮小圖片 */
                height: 100px;
            }
            
            /* 手機版 標題列和黃字說明大小調整 Star */
            .event-banner { /* 欄位高度大小*/
                height: 160px; 
            }
            .event-banner h1 { /* 大標題*/
                font-size: 30px; 
            }        
            .banner-info-wrap { /* 提示字*/
                margin-top: 10px;
                padding-bottom: 10px;
                font-size: 16px;
            }
            /* 手機版 標題列和黃字說明大小調整 End */
        }
    </style>
</head>
<body>

    <div id="header-layout"></div>

    <div id="sidebar"></div>

    <!--
    <section class="event-banner">
        <h1>歡迎登入立法院</h1>
        <div class="banner-info-wrap">
            <span><i class="fa-solid fa-crown"></i> 和諧穩固的大家庭</span>
            <span><i class="fa-solid fa-crown"></i> 多元人才與行動力的社群</span>
        </div>
    </section>
    -->

    <main class="event-content-area">
        <div class="org-image-container">
            <img src="https://github.com/ChengHan16/Other_File/blob/master/photo/%E7%AB%8B%E6%B3%95%E9%99%A2%E5%A4%A7%E9%A0%AD%E8%B2%BC.png?raw=true" alt="立法院大頭貼" class="org-logo">
        </div>

        <div class="info-card">
            <h2 style="color: #1a237e; margin-top: 0; display: flex; align-items: center;">
                <i class="fa-solid fa-landmark" style="margin-right: 12px;"></i> 組織精神
            </h2>
            <p style="line-height: 1.8; color: #555; font-size: 1.1em;">
                本組織致力於匯集各界專業人才，形成一個具備高度多元性與行動力的社群。我們強調成員間的緊密聯繫，並透過定期的活動交流，持續推動組織內部的成長，在不同領域展現獨特的影響力。
            </p>
        </div>

        <div class="info-card">
            <h2 style="color: #1a237e; margin-top: 0; display: flex; align-items: center;">
                <i class="fa-solid fa-handshake" style="margin-right: 12px;"></i> 法院和諧
            </h2>
            <p style="line-height: 1.8; color: #555; font-size: 1.1em;">
                和諧是「立法院」的核心價值之一。我們重視每一位成員的獨特特質，在交流中保持尊重與包容。透過彼此的專業互補與深厚情誼，共同營造一個溫暖且具備向心力的環境，確保組織能穩定且長久地運作。
            </p>
        </div>

        <div style="margin-top: 40px;">
            <h2 style="color: #1a237e; margin-left: 15px; border-left: 6px solid #1a237e; padding-left: 15px;">近期活動</h2>
            
            <div id="recent-events-container" class="events-grid">
                <p style="color:#666; width:100%; text-align:center;">載入活動資訊中...</p>
            </div>
            
            <div style="text-align:center; margin-top:20px;">
                <a href="event-documentation.html" style="color:#1a237e; font-weight:bold; text-decoration:none;">
                    查看所有活動 <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </main>

    <div id="footer-layout"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="./js/dashboard.js"></script>

    <script>        
        document.addEventListener("DOMContentLoaded", async () => {
            await loadLayout('index'); 
        });
        document.addEventListener("DOMContentLoaded", async () => {
            await loadLayout('index'); 
            
            // 監聽 Auth 狀態並抓取 act 集合資料
            firebase.auth().onAuthStateChanged(async (user) => {
                if (user) {
                    // 顯示基本 UID
                    document.getElementById('displayUid').innerText = user.uid;

                    try {
                        const db = firebase.firestore();
                        const doc = await db.collection("act").doc(user.uid).get();
                        
                        if (doc.exists) {
                            const data = doc.data();
                            // 更新名稱與圖片
                            document.getElementById('displayName').innerText = data.displayName || "系統使用者";
                            if (data.photoURL) {
                                document.getElementById('displayAvatar').src = data.photoURL;
                            }
                        } else {
                            document.getElementById('displayName').innerText = "查無此帳號資料";
                        }
                    } catch (error) {
                        console.error("抓取個人資訊失敗:", error);
                    }
                } else {
                    // 未登入處理
                    window.location.href = "login.html";
                }
            });

            startRecentEventsListener();
            await syncMemberData("班長", "歡迎登入立法院", "組織活動與通訊的集會所");
        });

        // 監聽並顯示近期活動 (移植自 event-documentation.html 的邏輯)
        function startRecentEventsListener() {
            const container = document.getElementById('recent-events-container');
            const db = firebase.firestore();

            db.collection("events").onSnapshot(snapshot => {
                let eventsArray = [];

                snapshot.forEach(doc => {
                    const ev = doc.data();
                    const id = doc.id;
                    // 解析時間欄位 (相容舊資料)
                    const timeField = ev.fields ? ev.fields.find(f => f.type === 'time') : null;
                    let sortDate = timeField ? new Date(timeField.content) : (ev.createdAt ? ev.createdAt.toDate() : new Date());
                    eventsArray.push({ id, ...ev, sortDate });
                });

                // 排序：由新到舊 (日期越大的在越前面)
                eventsArray.sort((a, b) => b.sortDate - a.sortDate);

                // 只取前 4 筆顯示，避免首頁過長
                const recentEvents = eventsArray.slice(0, 4);

                container.innerHTML = ""; // 清空容器

                if (recentEvents.length === 0) {
                    container.innerHTML = '<p style="color:#999; width:100%; text-align:center;">目前沒有活動</p>';
                    return;
                }

                recentEvents.forEach(ev => {
                    // 計算日期顯示格式
                    const day = ev.sortDate.getDate();
                    const month = ev.sortDate.toLocaleString('en-us', { month: 'short' }).toUpperCase();
                    const timeString = ev.sortDate.toLocaleString('zh-TW', { hour12: false, hour:'2-digit', minute:'2-digit' });
                    const dateString = `${ev.sortDate.getFullYear()}-${(ev.sortDate.getMonth()+1).toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;

                    // 計算倒數文字 (選用)
                    const countdownText = ev.deadline ? getCountdownText(ev.deadline) : "";
                    const countdownHtml = countdownText ? `<span style="color:#d93025; font-size:0.85em; font-weight:bold; margin-left:10px;">${countdownText}</span>` : "";

                    // 生成卡片 HTML
                    const cardHtml = `
                    <a href="event-documentation.html#${ev.id}" class="event-card-link">
                        <article class="event-card-simple">
                            <div class="event-date-circle">
                                <span class="day">${day}</span>
                                <span class="month">${month}</span>
                            </div>
                            <div class="event-info-box">
                                <h3>${ev.title}</h3>
                                <p class="date-text">
                                    <i class="fa-regular fa-clock"></i> ${dateString} ${timeString}
                                    ${countdownHtml}
                                </p>
                            </div>
                            <span class="action-arrow"><i class="fa-solid fa-arrow-right"></i></span>
                        </article>
                    </a>`;
                    
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });
            });
        }

        // 倒數計時輔助函式
        function getCountdownText(deadlineStr) {
            if (!deadlineStr) return "";
            const now = new Date().getTime();
            const deadline = new Date(deadlineStr).getTime();
            const diff = deadline - now;
            if (diff <= 0) return "(已截止)";
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days > 0) return `(倒數 ${days} 天)`;
            return "(即將截止)";
        }

        // 選單開關功能
        window.toggleNav = function() {
            const sidebar = document.getElementById("mySidebar");
            const overlay = document.getElementById("overlay");
            if (sidebar.style.width === "250px") {
                sidebar.style.width = "0";
                overlay.style.display = "none";
            } else {
                sidebar.style.width = "250px";
                overlay.style.display = "block";
            }
        };
        // 確保已取得 auth 實例
        const auth = firebase.auth(); 

        function confirmLogout() {
            if (confirm("確定登出系統？")) {
                auth.signOut()
                    .then(() => {
                        alert("已成功登出");
                        window.location.href = "login.html"; // 登出後跳轉至登入頁
                    })
                    .catch((error) => {
                        console.error("登出發生錯誤:", error);
                        alert("登出失敗，請稍後再試");
                    });
            }
        }
        function confirmLogout() { if (confirm("確定登出系統？")) auth.signOut().then(() => window.location.href = "login.html"); }
    </script>
</body>
</html>
