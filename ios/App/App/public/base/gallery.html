<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷年畫廊 - 立法院系統整合</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">

<style>
    :root { 
        --ly-blue: #1a237e;
        --ly-blue-trans: rgba(0, 49, 83, 0.85); 
        --ly-gold: #cfa900; 
        --bg-gray: #f2f4f7; 
        --border-color: #dee2e6; 
    }

    /* --- 畫廊清單風格 --- */
    .event-content-area {
        max-width: 1100px;
        margin: 0 auto !important; /* 強制覆蓋可能的外部負邊距干擾 */
        width: 92% !important; /* 手機版保留兩側 4% 完美安全邊距 */
        padding-top: 5px;
        padding-bottom: 40px;
        box-sizing: border-box;
    }

    .year-group-title {
        font-size: 1.5rem;
        color: var(--ly-blue);
        font-weight: bold;
        margin: 40px 0 20px;
        padding-left: 15px;
        border-left: 5px solid #ffcc00;
        display: flex;
        align-items: center;
        background: linear-gradient(90deg, rgba(0,49,83,0.08) 0%, transparent 100%);
        height: 45px;
    }

    .doc-list-item {
        background: white;
        border: 1px solid #e0e0e0;
        border-left: 6px solid var(--ly-blue);
        margin-bottom: 20px;
        padding: 22px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.3s ease;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        position: relative; 
        
        /* [修正核心] 讓 padding 向內壓縮，絕對不撐破 100% 寬度 */
        box-sizing: border-box; 
        width: 100%; 
    }

    .doc-list-item:hover {
        transform: translateX(8px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        border-color: #ffcc00;
    }

    /* 左側主預覽區 */
    .gallery-preview-wrap {
        display: flex;
        align-items: center;
        gap: 20px;
        flex: 1; 
        min-width: 0; /* 防止子元素撐破 Flex 容器 */
    }

    .gallery-thumbnail {
        width: 80px;
        height: 80px;
        border-radius: 8px;
        object-fit: cover;
        border: 2px solid var(--border-color);
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        flex-shrink: 0; /* 確保首圖不會被壓縮 */
    }

    .doc-info {
        flex: 1;
        min-width: 0; /* 確保文字過長時能夠截斷或換行 */
    }

    .doc-info h4 {
        margin: 0 0 10px 0;
        color: var(--ly-blue);
        font-size: 1.3rem;
        font-weight: 800;
        letter-spacing: 1px;
    }

    /* 右側橫向縮圖列 */
    .gallery-thumbnails-row {
        display: flex;
        gap: 8px;
        margin: 0 25px;
        align-items: center;
        flex-wrap: wrap; /* 允許空間不足時自動換行 */
    }

    .row-thumb-wrapper {
        position: relative;
        width: 55px;
        height: 55px;
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid #ddd;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        background: #ffffff00;
        flex-shrink: 0;
    }

    .row-thumb {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .row-thumb-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.65);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        font-weight: bold;
        backdrop-filter: blur(1px);
    }

    .doc-action-hint {
        color: #ffcc00;
        font-weight: 900;
        font-size: 1.2rem;
        flex-shrink: 0;
    }

    /* --- 文件預覽風格彈窗 CSS --- */
    .doc-modal {
        display: none; position: fixed; z-index: 9999;
        left: 0; top: 0; width: 100vw; height: 100vh;
        background: rgba(0, 20, 40, 0.75); backdrop-filter: blur(8px);
        justify-content: center; align-items: flex-start;
        padding: 20px 0; overflow-y: auto; overflow-x: hidden;
    }

    .doc-paper {
        background: #ffffff; width: 92%; max-width: 850px;
        margin: 20px auto 50px; padding: 60px 40px; position: relative;
        border: 1px solid #dcdcdc; box-shadow: 0 0 40px rgba(0,0,0,0.15);
        box-sizing: border-box;
        background-image: 
            linear-gradient(90deg, #003153 0px, #003153 4px, transparent 4px, transparent 7px, #cfaf3c 7px, #cfaf3c 9px, transparent 9px),
            linear-gradient(#fdfdfd 1px, transparent 1px);
        background-size: 100% 100%, 100% 2.5rem;
    }

    .doc-header { text-align: center; border-bottom: 2px double #003153; padding-bottom: 25px; margin-bottom: 40px; }
    
    /* 浮水印樣式 */
    .doc-watermark {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
        font-size: 6rem; color: rgba(0, 49, 83, 0.04); pointer-events: none; white-space: nowrap;
        font-weight: 900; z-index: 200000;
    }
    .doc-watermark-Legislature {
        position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
        font-size: 32px; color: rgba(0, 49, 83, 0.04); pointer-events: none; white-space: nowrap;
        font-weight: 900; z-index: 200000;
    }

    .doc-close-btn {
        position: absolute; right: 25px; top: 25px; font-size: 2rem;
        cursor: pointer; color: #999; background: none; border: none; z-index: 10;
    }

    .doc-close-footer-btn {
        display: block; margin: 25px auto 0; padding: 12px 45px; 
        background: #4a5568; color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.2); 
        border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem;
        letter-spacing: 2px; transition: all 0.3s ease; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .doc-close-footer-btn:hover { background: #2d3748; transform: translateY(-2px); }

    .doc-meta-container { display: flex; justify-content: center; gap: 20px; font-size: 0.9rem; color: #666; }

    /* --- 彈窗內部的畫廊直列展示 --- */
    .gallery-full-item {
        margin-bottom: 50px;
        padding: 20px;
        background: rgba(242, 244, 247, 0.5);
        border-radius: 12px;
        border: 1px dashed #ccc;
        position: relative;
        overflow: hidden; 
    }

    .gallery-full-item h4 {
        text-align: center;
        color: var(--ly-blue);
        margin: 0 0 15px 0;
        font-size: 1.25rem;
        letter-spacing: 1px;
        position: relative;
        z-index: 10;
    }

    .gallery-full-item img {
        display: block;
        max-width: 90%;
        margin: 0 auto;
        cursor: pointer;
        border: 3px solid #fff;
        box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        border-radius: 8px;
        transition: transform 0.3s ease;
        position: relative;
        z-index: 10;
    }
    
    .gallery-full-item img:hover {
        transform: scale(1.02);
    }

    /* --- 圖片檢視器 --- */
    #image-viewer-modal {
        display: none; position: fixed; z-index: 20000; left: 0; top: 0;
        width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95);
        flex-direction: column; overflow: hidden;
    }
    .slider-container { flex-grow: 1; width: 100%; overflow: hidden; display: flex; align-items: center; position: relative; cursor: grab; }
    .slider-container:active { cursor: grabbing; }
    .slider-track { display: flex; height: 80vh; transition: transform 0.3s ease-out; will-change: transform; z-index: 10; }
    .slider-slide { min-width: 100vw; height: 100%; display: flex; justify-content: center; align-items: center; padding: 0 10px; box-sizing: border-box; }
    .slider-slide img { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: auto; user-select: none; -webkit-user-drag: none; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    
    .viewer-header {
        position: absolute; top: 0; left: 0; width: 100%; height: 80px; 
        display: flex; justify-content: space-between; align-items: flex-start; padding: 20px;
        z-index: 20010; box-sizing: border-box; pointer-events: none; transition: opacity 1.5s ease-in-out; opacity: 1;
    }
    .viewer-counter { color: rgba(255, 255, 255, 0.8); font-size: 1rem; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 15px; pointer-events: auto; margin-top: 5px; }
    .viewer-close { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; pointer-events: auto; transition: background 0.2s; }
    .viewer-close:hover { background: rgba(255,255,255,0.4); }
    .viewer-controls-group { display: flex; align-items: center; gap: 12px; pointer-events: auto; }

    .viewer-thumbnails {
        position: absolute; bottom: 70px; left: 0; width: 100%; height: 60px;
        display: flex; justify-content: center; align-items: center; gap: 12px;
        padding: 0 20px; box-sizing: border-box; overflow-x: auto; overflow-y: hidden;
        z-index: 20010; transition: opacity 1.5s ease-in-out; opacity: 1; pointer-events: auto;
        -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .viewer-thumbnails::-webkit-scrollbar { display: none; }
    .thumbnail-item { width: 40px; height: 40px; flex-shrink: 0; border-radius: 6px; overflow: hidden; opacity: 0.4; border: 2px solid transparent; cursor: pointer; transition: all 0.2s ease; transform: scale(0.9); }
    .thumbnail-item img { width: 100%; height: 100%; object-fit: cover; }
    .thumbnail-item.active { opacity: 1; border-color: var(--ly-gold); transform: scale(1.15); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    
    .viewer-hint { position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-size: 0.9rem; pointer-events: none; transition: opacity 1.5s ease-in-out; opacity: 1; z-index: 20010; }
    .user-idle .viewer-header, .user-idle .viewer-hint, .user-idle .viewer-thumbnails { opacity: 0; pointer-events: none; }
    .body-scroll-lock { overflow: hidden !important; height: 100vh !important; width: 100vw !important; position: fixed !important; top: 0; left: 0; }

    /* --- 手機版 RWD 優化：防止溢出與位移 --- */
    @media (max-width: 850px) {
        .doc-list-item {
            flex-direction: column;
            align-items: flex-start;
            padding: 20px; /* 統一內縮邊距，保證左右對稱 */
            gap: 15px;
        }
        .gallery-preview-wrap { 
            width: 100%; 
            margin-right: 0; 
            padding-right: 35px; /* 留出放大鏡專屬的點擊與視覺空間 */
        }
        .gallery-thumbnails-row {
            margin: 0;
            width: 100%;
        }
        .doc-action-hint {
            position: absolute;
            right: 20px; 
            top: 25px;   
        }
        .gallery-thumbnail { 
            width: 65px; height: 65px; 
        }
        .row-thumb-wrapper {
            width: 50px; height: 50px;
        }
        .doc-paper { 
            padding: 40px 20px; width: 95%; 
        }
        .doc-meta-container { 
            flex-direction: column; align-items: center; gap: 8px; 
        }
        /* 手機版縮小浮水印 */
        .doc-watermark { font-size: 3.5rem; }
        .doc-watermark-Legislature { font-size: 1.5rem; }
    }
</style>
</head>
<body>
    <div id="header-layout"></div>

    <section class="event-banner">
        <h1>畫廊與影像紀錄</h1>
        <div class="banner-info-wrap">
            <span><i class="fa-solid fa-crown"></i> 和諧穩固的大家庭</span>
            <span><i class="fa-solid fa-images"></i> 影像點滴紀錄</span>
        </div>
    </section>

    <main class="event-content-area">
        <div class="year-group-title">立法院歷年畫廊</div>
        
        <div id="gallery-list-container"></div>
    </main>

    <div id="doc-preview-modal" class="doc-modal" onclick="handleOutsideClick(event)">
        <article class="doc-paper">
            <button class="doc-close-btn" onclick="closeDocPreview()">&times;</button>
            <div class="doc-watermark">影像檔案存查</div>
            
            <header class="doc-header" id="modal-header-content"></header>
            
            <section id="doc-content" style="line-height: 1.8; color: #333; margin-bottom: 20px;"></section>

            <footer>
                <button class="doc-close-footer-btn" onclick="closeDocPreview()">
                    返回列表
                </button>
            </footer>
        </article>
    </div>

    <div id="image-viewer-modal" onclick="handleViewerClick(event)">
        <div class="viewer-header">
            <div class="viewer-counter" id="viewer-counter">1 / 1</div>
            <div class="viewer-controls-group">
                <button class="viewer-close" onclick="event.stopPropagation(); closeImageViewer()">&times;</button>
            </div>
        </div>
        <div class="slider-container" id="slider-container">
            <div class="doc-watermark guest-only-watermark" style="color: rgba(0, 49, 83, 0.15);">活動檔案存查</div>
            <div class="doc-watermark-Legislature guest-only-watermark" style="color: rgba(0, 49, 83, 0.15);">立法院 Legislature</div>
            
            <div class="slider-track" id="slider-track"></div>
        </div>
        <div class="viewer-thumbnails" id="viewer-thumbnails" onclick="event.stopPropagation()"></div>
        <div class="viewer-hint"><i class="fas fa-hand-pointer"></i> 左右拖曳或使用滾輪切換</div>
    </div>

    <div id="footer-layout"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="./js/main.js"></script>

    <script>
        // 設定選單與 Header 載入所需參數
        window.PAGE_HEADER_CONFIG = {
            title: "畫廊與影像紀錄",
            dept: '<i class="fa-solid fa-images"></i> 影像點滴紀錄',
            group: '<i class="fa-solid fa-crown"></i> 和諧穩固的大家庭'
        };

        document.addEventListener("DOMContentLoaded", async () => {
            if (typeof loadLayout === 'function') {
                await loadLayout('events');
            }
            renderGalleryList();
        });

        // 畫廊資料庫
        const galleryDatabase = {
            'avatars': {
                title: '群組大頭貼',
                subtitle: '歷年群組頭像與標誌紀錄',
                date: '2017 - 2026',
                idPrefix: 'IMG-AVATAR',
                description: '本相簿收錄了立法院群組自 2017 年至 2026 年間，於各個社群平台 (LINE, Discord) 所使用過之官方頭像與圖示紀錄。',
                images: [
                    { title: "Legislature_iCon (2017)", url: "https://github.com/ChengHan16/Other_File/blob/master/Legislature/photo/legislative-yuan-photo-gallery/Legislature_iCon%20(2017).png?raw=true" },
                    { title: "Legislature_x_LINE (2017)", url: "https://github.com/ChengHan16/Other_File/blob/master/Legislature/photo/legislative-yuan-photo-gallery/Legislature_x_LINE%20(2017).png?raw=true" },
                    { title: "Legislature x Discord (2017)", url: "https://github.com/ChengHan16/Other_File/blob/master/Legislature/photo/legislative-yuan-photo-gallery/Legislature%20x%20Discord-iCon%20(2017).png?raw=true" },
                    { title: "Legislature_x_LINE (2026)", url: "https://github.com/ChengHan16/Other_File/blob/master/Legislature/photo/legislative-yuan-photo-gallery/Legislature%20x%20LINE%20(2026)%20git.png?raw=true" },
                    { title: "Legislature x Discord (2026)", url: "https://github.com/ChengHan16/Other_File/blob/master/Legislature/photo/legislative-yuan-photo-gallery/Legislature-iCon%20(2026).png?raw=true" }
                ]
            }
        };

        let currentGalleryImages = [];

        // 動態渲染列表與橫向縮圖列
        function renderGalleryList() {
            const container = document.getElementById('gallery-list-container');
            container.innerHTML = '';

            for (const [id, data] of Object.entries(galleryDatabase)) {
                let thumbsHtml = '';
                const maxDisplay = 5; 
                const displayCount = Math.min(data.images.length, maxDisplay);
                
                for (let i = 0; i < displayCount; i++) {
                    const isLast = (i === maxDisplay - 1) && (data.images.length > maxDisplay);
                    const remainCount = data.images.length - maxDisplay + 1; 
                    
                    if (isLast) {
                        thumbsHtml += `
                            <div class="row-thumb-wrapper">
                                <img src="${data.images[i].url}" class="row-thumb">
                                <div class="row-thumb-overlay">+${remainCount}</div>
                            </div>
                        `;
                    } else {
                        thumbsHtml += `
                            <div class="row-thumb-wrapper">
                                <img src="${data.images[i].url}" class="row-thumb">
                            </div>
                        `;
                    }
                }

                const itemHtml = `
                    <div class="doc-list-item" onclick="openGalleryItem('${id}')">
                        <div class="gallery-preview-wrap">
                            <!--<img src="${data.images[0].url}" class="gallery-thumbnail" alt="首圖">-->
                            <div class="doc-info">
                                <h4>${data.title}</h4>
                                <div style="color: #666; font-size: 0.95rem; margin-top: 5px;">
                                    <i class="far fa-images"></i> ${data.subtitle} (共 ${data.images.length} 張)
                                </div>
                            </div>
                        </div>
                        
                        <div class="gallery-thumbnails-row">
                            ${thumbsHtml}
                        </div>
                        
                        <div class="doc-action-hint"><i class="fas fa-search-plus"></i></div>
                    </div>
                `;
                container.innerHTML += itemHtml;
            }
        }

        function openGalleryItem(itemId) {
            const data = galleryDatabase[itemId];
            if (!data) return;

            currentGalleryImages = data.images.map(img => img.url);

            const headerHtml = `
                <h1 id="doc-title" style="color: var(--ly-blue); margin-bottom: 10px;">${data.title}</h1>
                <div class="doc-meta-container">
                    <span>編號：${data.idPrefix}</span>
                    <span>年份紀錄：${data.date}</span>
                </div>`;
            document.getElementById('modal-header-content').innerHTML = headerHtml;

            const contentArea = document.getElementById('doc-content');
            let contentHtml = `
                <div style="border-bottom: 1px solid #f2f2f2; padding-bottom: 15px; margin-bottom: 25px; font-size: 1.05rem; color: #444;text-align: justify;">
                    ${data.description}
                </div>
                <div style="font-weight: bold; color: var(--ly-blue); font-size: 1.1rem; margin-bottom: 20px;">[ 影像總覽 ]</div>
                <div class="gallery-full-list">
            `;

            // 動態產生每一張帶有浮水印的照片
            data.images.forEach((img, index) => {
                contentHtml += `
                    <div class="gallery-full-item">
                        <h4>${img.title}</h4>
                        <div class="doc-watermark guest-only-watermark" style="color: rgba(0, 49, 83, 0.15);">活動檔案存查</div>
                        <div class="doc-watermark-Legislature guest-only-watermark" style="color: rgba(0, 49, 83, 0.15);">立法院 Legislature</div>
                        <img src="${img.url}" onclick="openImageViewer(${index})" alt="${img.title}">
                    </div>
                `;
            });
            contentHtml += `</div>
            <p style="text-align: center; color: #888; font-size: 0.9rem; margin-top: 15px;">點擊上方任一照片開啟全螢幕檢視</p>`;

            contentArea.innerHTML = contentHtml;

            const modal = document.getElementById('doc-preview-modal');
            modal.style.display = 'flex';
            const scrollY = window.scrollY;
            document.body.style.top = `-${scrollY}px`;
            document.body.classList.add('body-scroll-lock');
        }

        function closeDocPreview() {
            const modal = document.getElementById('doc-preview-modal');
            modal.style.display = 'none';
            const scrollY = document.body.style.top;
            document.body.classList.remove('body-scroll-lock');
            document.body.style.top = '';
            if (scrollY) {
                window.scrollTo(0, parseInt(scrollY || '0') * -1);
            }
        }

        function handleOutsideClick(event) {
            const modal = document.getElementById('doc-preview-modal');
            if (event.target === modal) closeDocPreview();
        }

        /* --- 全螢幕照片檢視器 (Slider) 邏輯 --- */
        let currentSlideIndex = 0;
        let isDragging = false;
        let startPos = 0;
        let currentTranslate = 0;
        let prevTranslate = 0;
        let animationID;
        let isAnimating = false;
        let idleTimer = null;
        
        const sliderContainer = document.getElementById('slider-container');
        const sliderTrack = document.getElementById('slider-track');
        const viewerModal = document.getElementById('image-viewer-modal');

        function openImageViewer(startIndex) {
            if (currentGalleryImages.length === 0) return;
            currentSlideIndex = startIndex || 0;
            
            sliderTrack.innerHTML = "";
            currentGalleryImages.forEach(imgUrl => {
                const slide = document.createElement('div');
                slide.classList.add('slider-slide');
                slide.innerHTML = `<img src="${imgUrl}" draggable="false" onclick="event.stopPropagation()">`; 
                sliderTrack.appendChild(slide);
            });

            const thumbsContainer = document.getElementById('viewer-thumbnails');
            thumbsContainer.innerHTML = "";
            
            if (currentGalleryImages.length > 1) {
                thumbsContainer.style.display = 'flex';
                currentGalleryImages.forEach((imgUrl, index) => {
                    const thumb = document.createElement('div');
                    thumb.className = 'thumbnail-item';
                    thumb.onclick = () => {
                        currentSlideIndex = index;
                        updateSliderPosition();
                        updateCounter();
                        resetIdleTimer(); 
                    };
                    thumb.innerHTML = `<img src="${imgUrl}" draggable="false">`;
                    thumbsContainer.appendChild(thumb);
                });
            } else {
                thumbsContainer.style.display = 'none';
            }

            viewerModal.style.display = 'flex';
            viewerModal.classList.remove('user-idle'); 
            
            updateSliderPosition(true); 
            updateCounter();
            attachSliderEvents();
            resetIdleTimer();
        }

        function closeImageViewer() {
            viewerModal.style.display = 'none';
            cancelAnimationFrame(animationID);
            detachSliderEvents();
            if (idleTimer) clearTimeout(idleTimer);
        }

        function handleViewerClick(event) {
            if (event.target.closest('#viewer-thumbnails')) return;
            if (event.target.id === 'image-viewer-modal' || 
                event.target.classList.contains('slider-container') ||
                event.target.classList.contains('slider-track') ||
                event.target.classList.contains('slider-slide')) {
                closeImageViewer();
            }
        }

        function resetIdleTimer() {
            viewerModal.classList.remove('user-idle');
            if (idleTimer) clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                viewerModal.classList.add('user-idle');
            }, 1500);
        }

        function updateCounter() {
            document.getElementById('viewer-counter').innerText = 
                `${currentSlideIndex + 1} / ${currentGalleryImages.length}`;
        }

        function attachSliderEvents() {
            ['touchstart', 'touchmove', 'touchend', 'mousemove', 'mousedown', 'mouseup', 'wheel', 'click'].forEach(evt => {
                viewerModal.addEventListener(evt, resetIdleTimer);
            });
            sliderContainer.addEventListener('touchstart', touchStart);
            sliderContainer.addEventListener('touchend', touchEnd);
            sliderContainer.addEventListener('touchmove', touchMove, { passive: false });
            sliderContainer.addEventListener('mousedown', touchStart);
            sliderContainer.addEventListener('mouseup', touchEnd);
            sliderContainer.addEventListener('mouseleave', () => { if(isDragging) touchEnd() });
            sliderContainer.addEventListener('mousemove', touchMove);
            sliderContainer.addEventListener('wheel', handleWheel);
        }

        function detachSliderEvents() {
            ['touchstart', 'touchmove', 'touchend', 'mousemove', 'mousedown', 'mouseup', 'wheel', 'click'].forEach(evt => {
                viewerModal.removeEventListener(evt, resetIdleTimer);
            });
            sliderContainer.removeEventListener('touchstart', touchStart);
            sliderContainer.removeEventListener('touchend', touchEnd);
            sliderContainer.removeEventListener('touchmove', touchMove);
            sliderContainer.removeEventListener('mousedown', touchStart);
            sliderContainer.removeEventListener('mouseup', touchEnd);
            sliderContainer.removeEventListener('mousemove', touchMove);
            sliderContainer.removeEventListener('wheel', handleWheel);
        }

        function getPositionX(event) {
            return event.type.includes('mouse') ? event.pageX : event.touches[0].clientX;
        }

        function touchStart(e) {
            isDragging = true;
            startPos = getPositionX(e);
            prevTranslate = -currentSlideIndex * window.innerWidth;
            sliderContainer.style.cursor = 'grabbing';
            sliderTrack.style.transition = 'none';
            animationID = requestAnimationFrame(animation);
        }

        function touchMove(e) {
            if (isDragging) {
                if(e.type.includes('touch')) e.preventDefault(); 
                const currentPosition = getPositionX(e);
                const diff = currentPosition - startPos;
                currentTranslate = prevTranslate + diff;
            }
        }

        function touchEnd() {
            isDragging = false;
            cancelAnimationFrame(animationID);
            sliderContainer.style.cursor = 'grab';
            
            const movedBy = currentTranslate - prevTranslate;
            const threshold = 100;
            if (movedBy < -threshold && currentSlideIndex < currentGalleryImages.length - 1) {
                currentSlideIndex += 1;
            } else if (movedBy > threshold && currentSlideIndex > 0) {
                currentSlideIndex -= 1;
            }
            updateSliderPosition();
            updateCounter();
        }

        function animation() {
            setSliderPosition(currentTranslate);
            if (isDragging) requestAnimationFrame(animation);
        }

        function setSliderPosition(xPosition) {
            sliderTrack.style.transform = `translateX(${xPosition}px)`;
        }

        function updateSliderPosition(instant = false) {
            const targetTranslate = -currentSlideIndex * window.innerWidth;
            prevTranslate = targetTranslate; 
            currentTranslate = targetTranslate;

            if (instant) {
                sliderTrack.style.transition = 'none';
                setSliderPosition(targetTranslate);
            } else {
                isAnimating = true;
                sliderTrack.style.transition = 'transform 0.3s ease-out';
                setSliderPosition(targetTranslate);
                setTimeout(() => { isAnimating = false; }, 300);
            }

            const allThumbs = document.querySelectorAll('.thumbnail-item');
            if (allThumbs.length > 0) {
                allThumbs.forEach((thumb, index) => {
                    if (index === currentSlideIndex) {
                        thumb.classList.add('active');
                        thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    } else {
                        thumb.classList.remove('active');
                    }
                });
            }
        }

        function handleWheel(e) {
            if (isAnimating) return; 
            if (e.deltaY > 0) {
                if (currentSlideIndex < currentGalleryImages.length - 1) {
                    currentSlideIndex++;
                    updateSliderPosition(); updateCounter(); resetIdleTimer();
                }
            } else {
                if (currentSlideIndex > 0) {
                    currentSlideIndex--;
                    updateSliderPosition(); updateCounter(); resetIdleTimer();
                }
            }
        }

        document.addEventListener('keydown', function(e) {
            if (document.getElementById('image-viewer-modal').style.display === 'flex') {
                resetIdleTimer();
                if (e.key === 'ArrowLeft' && currentSlideIndex > 0) {
                    currentSlideIndex--; updateSliderPosition(); updateCounter();
                }
                if (e.key === 'ArrowRight' && currentSlideIndex < currentGalleryImages.length - 1) {
                    currentSlideIndex++; updateSliderPosition(); updateCounter();
                }
                if (e.key === 'Escape') closeImageViewer();
            }
        });

        window.addEventListener('resize', () => {
            if (document.getElementById('image-viewer-modal').style.display === 'flex') {
                updateSliderPosition(true);
            }
        });
    </script>
</body>
</html>
