<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>立法院 - 關於我們</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/authenticated.css">
    <link rel="stylesheet" href="./css/authenticated-about.css">

</head>
<style>
    /* 檔案上傳專用樣式 */
        .upload-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .upload-box {
            background: white;
            border: 2px dashed var(--border-color);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .upload-box:hover, .upload-box.dragover {
            border-color: var(--ly-gold);
            background: rgba(207, 169, 0, 0.05);
        }

        .upload-icon {
            font-size: 3.5rem;
            color: var(--ly-blue);
            margin-bottom: 15px;
        }

        .upload-limit {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 20px;
        }

        /* 進度條 */
        .progress-bar-bg {
            background: #eee;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: var(--ly-gold);
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }

        /* 檔案卡片 */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .file-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 4px solid var(--ly-blue);
        }

        .file-card i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--ly-blue);
        }

        .file-name {
            font-size: 0.9em;
            font-weight: bold;
            text-align: center;
            word-break: break-all;
            margin-bottom: 10px;
        }

        .btn-download {
            background: var(--ly-gold);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8em;
            cursor: pointer;
            text-decoration: none;
        }
</style>

<body>
    <div id="header-layout"></div>

    <div id="mySidebar"></div>

    <main class="event-content-area">
        <div class="section-title">行政檔案上傳</div>
        
        <div class="upload-container">
            <div class="upload-box" id="drop-zone">
                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                <p>點擊或拖拽檔案至此處上傳</p>
                <p class="upload-limit">支援格式：PDF, Word, PNG, JPG (最大 10MB)</p>
                <input type="file" id="file-input" hidden accept=".pdf,.doc,.docx,.png,.jpg,.jpeg">
                <button class="btn-confirm" onclick="document.getElementById('file-input').click()">選擇檔案</button>
            </div>

            <div id="progress-container" style="display: none; margin-top: 20px;">
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
                <p id="progress-text" style="text-align: center; font-size: 0.9em; color: var(--ly-blue); margin-top: 5px;">0%</p>
            </div>

            <div class="section-title">已上傳檔案</div>
            <div id="file-list" class="file-grid">
                </div>
        </div>
    </main>

    <div id="footer-layout"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

<script src="./js/dashboard.js"></script>

<script>
    // **注意：這裡不需要再寫 const db = ... 或 firebase.initializeApp(...) **
    // dashboard.js 已經幫您宣告好了全域變數 db, auth
    
    // 初始化 Storage (如果 dashboard.js 沒寫這行，才需要補這行)
    const storage = firebase.storage();

    const creationInfo01 = `<i class="fa-solid fa-calendar-check"></i> 創立時間：2019/07/03`;
    const creationInfo02 = `<i class="fa-solid fa-crown"></i> 創辦人：班長`;

    document.addEventListener("DOMContentLoaded", async () => {
        // A. 執行版面與 Banner 同步
        // 確保 loadLayout 名稱與 dashboard.js 內一致
        if (typeof loadLayout === "function") {
            await loadLayout('D'); 
        }
        if (typeof syncMemberData === "function") {
            await syncMemberData("班長", creationInfo01, creationInfo02);
        }

        // B. 初始化檔案上傳監聽
        initFileUpload();

        // C. 啟動檔案清單監聽
        startFileListen();
    });

    // --- 檔案上傳核心邏輯 ---
    function initFileUpload() {
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        if(!fileInput || !dropZone) return;

        fileInput.addEventListener('change', (e) => handleUpload(e.target.files[0]));
        
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = "#fdfcf5"; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.background = "white"; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = "white";
            handleUpload(e.dataTransfer.files[0]);
        });
    }

    async function handleUpload(file) {
        if (!file) return;
        
        const storageRef = storage.ref(`admin_files/${Date.now()}_${file.name}`);
        const uploadTask = storageRef.put(file);
        const pContainer = document.getElementById('progress-container');
        const pBar = document.getElementById('progress-bar');
        const pText = document.getElementById('progress-text');

        if(pContainer) pContainer.style.display = 'block';

        uploadTask.on('state_changed', 
            (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                if(pBar) pBar.style.width = progress + '%';
                if(pText) pText.innerText = Math.round(progress) + '%';
            }, 
            (err) => { alert("上傳失敗"); console.error(err); }, 
            async () => {
                const url = await uploadTask.snapshot.ref.getDownloadURL();
                // 存入 Firestore 'file' 集合
                await db.collection("file").add({
                    fileName: file.name,
                    fileUrl: url,
                    fileType: file.type,
                    uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("檔案上傳成功！");
                if(pContainer) pContainer.style.display = 'none';
            }
        );
    }

    function startFileListen() {
        const listEl = document.getElementById('file-list');
        if(!listEl) return;
        
        db.collection("file").orderBy("uploadedAt", "desc").onSnapshot(snapshot => {
            listEl.innerHTML = "";
            snapshot.forEach(doc => {
                const f = doc.data();
                let icon = "fa-file-lines";
                if(f.fileType.includes('pdf')) icon = "fa-file-pdf";
                if(f.fileType.includes('image')) icon = "fa-file-image";
                if(f.fileName.endsWith('.doc') || f.fileName.endsWith('.docx')) icon = "fa-file-word";

                const card = `
                    <div class="event-card-link" style="width: 320px; margin: 10px;">
                        <div class="event-card-simple" style="border-left: 6px solid var(--ly-gold); display:flex; align-items:center; background:white; padding:15px; border-radius:10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                            <div class="event-date-circle" style="background: var(--ly-blue); border-color: var(--ly-gold); width:50px; height:50px; border-radius:50%; display:flex; justify-content:center; align-items:center; color:var(--ly-gold); margin-right:15px; flex-shrink:0;">
                                <i class="fas ${icon}"></i>
                            </div>
                            <div class="event-info-box" style="flex-grow:1; min-width:0;">
                                <h3 style="font-size: 1rem; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${f.fileName}</h3>
                                <p style="margin:5px 0 0 0;"><a href="${f.fileUrl}" target="_blank" style="color: var(--ly-gold); text-decoration:none; font-size:0.85rem; font-weight:bold;">點擊下載 / 檢視</a></p>
                            </div>
                        </div>
                    </div>`;
                listEl.insertAdjacentHTML('beforeend', card);
            });
        });
    }

    // 選單開關功能
        window.toggleNav = function() {
            const sidebar = document.getElementById("mySidebar");
            const overlay = document.getElementById("overlay");
            if (sidebar.style.width === "250px") {
                sidebar.style.width = "0";
                overlay.style.display = "none";
            } else {
                sidebar.style.width = "250px";
                overlay.style.display = "block";
            }
        };
        // 確保已取得 auth 實例
        const auth = firebase.auth(); 

        function confirmLogout() {
            if (confirm("確定登出系統？")) {
                auth.signOut()
                    .then(() => {
                        alert("已成功登出");
                        window.location.href = "login.html"; // 登出後跳轉至登入頁
                    })
                    .catch((error) => {
                        console.error("登出發生錯誤:", error);
                        alert("登出失敗，請稍後再試");
                    });
            }
        }
        function confirmLogout() { if (confirm("確定登出系統？")) auth.signOut().then(() => window.location.href = "login.html"); }
</script>
</body>
