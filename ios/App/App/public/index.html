<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>立法院 - 系統登入</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- 基礎設定 --- */
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        /* --- 關鍵修改：將隱藏效果移到登入框上 --- */
        .login-wrapper { 
            max-width: 450px; 
            width: 100%; 
            background-color: #fff; 
            padding: 50px 40px; 
            border-radius: 2px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            
            /* 預設隱藏表單，等待 Firebase 驗證 */
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px); /* 加入微微上浮的動畫讓視覺更平滑 */
            transition: all 0.4s ease;
        }

        /* 當 Firebase 確認未登入時顯示表單 */
        .login-wrapper.auth-resolved {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* --- 標題設計 --- */
        .brand-logo { 
            color: #003153; 
            font-size: 28px; 
            margin-bottom: 5px; 
            font-weight: bold;
            letter-spacing: 2px;
        }
        .accent-line {
            width: 40px;
            height: 4px;
            background-color: #b8860b; 
            margin: 15px auto 35px auto;
        }

        /* --- 表單控制 --- */
        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }
        .input-container {
            position: relative;
        }
        .input-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        input { 
            width: 100%;
            padding: 12px 15px 12px 45px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 2px;
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #003153; box-shadow: 0 0 0 2px rgba(0,49,83,0.1); }

        /* --- 按鈕樣式 --- */
        .login-btn { 
            width: 100%;
            padding: 14px;
            background-color: #003153;
            color: white;
            border: none;
            border-radius: 2px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .login-btn:hover { background-color: #00233b; }
        .login-btn:active { transform: scale(0.99); }

        #msg { height: 20px; margin-top: 15px; font-size: 14px; font-weight: 500; }

        /* --- 行動裝置適應 (RWD) --- */
        @media (max-width: 600px) {
            body { 
                background-color: #fff; 
                align-items: flex-start; 
            }
            .login-wrapper { 
                max-width: none; 
                width: 100%; 
                height: 100vh; 
                padding: 60px 30px; 
                box-shadow: none; 
                border-radius: 0; 
                border: none;
            }
            .brand-logo { font-size: 32px; margin-top: 20px; }
            .login-btn { padding: 18px; font-size: 18px; } 
        }
    </style>
</head>
<body>
<div id="loadingOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 9999; flex-direction: column; justify-content: center; align-items: center;">
    <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: #003153; margin-bottom: 20px;"></i>
    <span style="color: #003153; font-size: 1.1rem; font-weight: bold; letter-spacing: 1px;">安全連線中，準備進入系統...</span>
</div>
    

<div class="login-wrapper">
    <div class="brand-logo"><i class="fas fa-landmark"></i> 立法院</div>
    <div class="accent-line"></div>
    
    <div style="color:#666; margin-bottom: 30px; font-size: 14px; letter-spacing: 1px;">
        ADMINISTRATION SYSTEM
    </div>

    <div class="form-group">
        <label>帳號 (Email)</label>
        <div class="input-container">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="請輸入公務帳號" autocomplete="email">
        </div>
    </div>

    <div class="form-group">
        <label>密碼 (Password)</label>
        <div class="input-container">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="請輸入密碼" autocomplete="current-password">
        </div>
    </div>

    <button id="loginBtn" class="login-btn">進入管理系統</button>
    
    <p id="msg"></p>

    <div style="margin-top: 40px; font-size: 12px; color: #aaa; text-align: center;">
        © 2026 立法院 Legislature. All rights reserved.
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACnoimIASfb1rb59SbgLDkUmyYR6ODbUU",
        authDomain: "llwb-ed686.firebaseapp.com",
        projectId: "llwb-ed686",
        storageBucket: "llwb-ed686.firebasestorage.app",
        messagingSenderId: "940345852074",
        appId: "1:940345852074:web:7a30cca5a6d997a92350d3"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const loginWrapper = document.querySelector('.login-wrapper');
    const msgEl = document.getElementById('msg');
    let isNavigating = false;

    function navigateToApp() {
        if (isNavigating) return;
        isNavigating = true;
        msgEl.innerText = "登入成功！正在進入系統...";
        msgEl.style.color = "#003153";

        document.querySelector('.login-wrapper').style.display = 'none';
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        setTimeout(() => { 
            // 【關鍵修正】：加上 ./ 讓 iOS 確實知道檔案在同一個資料夾
            window.location.replace("./Messenger.html"); 
        }, 300);
    }

    const fallbackTimer = setTimeout(() => { loginWrapper.classList.add("auth-resolved"); }, 3000);

    auth.onAuthStateChanged((user) => {
        clearTimeout(fallbackTimer); 
        if (user) { navigateToApp(); } 
        else { loginWrapper.classList.add("auth-resolved"); }
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            msgEl.innerText = "請完整填寫憑證資訊";
            msgEl.style.color = "#a94442";
            return;
        }

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.style.opacity = "0.7";

        // 第一步：確認按鈕有反應
        msgEl.innerText = "[1/3] 準備連線 (03.07-C)...";
        msgEl.style.color = "#003153";

        // 直接執行登入，看看是不是 setPersistence 在搞鬼
        // 直接執行登入，看看是不是 setPersistence 在搞鬼
        auth.signInWithEmailAndPassword(email, password)
            .then(async (userCredential) => {
                // 1. 從登入成功的憑證中取出 user 物件
                const user = userCredential.user;
                
                // 2. 取得 Token (強烈建議使用 Firebase 官方標準的 getIdToken)
                const token = await user.getIdToken(); 
                
                // 3. 寫入 localStorage
                localStorage.setItem("token", token);
                
                // (選項) 如果你堅持使用你原本寫的 user.accessToken，可以改寫成這樣：
                // localStorage.setItem("token", user.accessToken || user.stsTokenManager.accessToken);
                
                // 4. Token 存好之後，才執行跳轉
                navigateToApp();
            })
            .catch((error) => {
                // ... 下方的 catch 錯誤處理維持原樣 ...
                msgEl.style.color = "#a94442";
                msgEl.innerText = "失敗: " + error.code; 
                btn.disabled = false;
                btn.style.opacity = "1";
                isNavigating = false; 
            });

        // 第二步：這行字如果有出來，代表請求已經發給 Google 了
        // 如果畫面卡在這行字，100% 是被 iOS CORS (網域安全政策) 擋下！
        setTimeout(() => {
            if (!isNavigating && msgEl.innerText.includes("[1/3]")) {
                msgEl.innerText = "[2/3] 請求已送出，等待 Google...";
            }
        }, 500);
    });
</script>
</body>
</html>
