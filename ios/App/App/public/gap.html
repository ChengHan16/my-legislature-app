<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Gap 即時調整範例</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background-color: #f8f9fa; }
        
        /* 控制面板樣式 */
        .controls {
            background: white; padding: 20px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px;
            display: inline-block;
        }
        .control-group { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; font-weight: bold; }

        /* 預覽容器 - 使用 Grid 佈局 */
        .preview-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 固定的三欄設計 */
            background-color: #ffffff;
            border: 2px dashed #1a237e;
            padding: 20px;
            /* 初始 gap 數值 */
            column-gap: 20px;
            row-gap: 20px;
            transition: 0.1s; /* 讓變化稍微平滑一點 */
        }

        .box {
            background-color: #ffcc00;
            color: #1a237e;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            border-radius: 5px;
            border: 1px solid #e6b800;
        }
    </style>
</head>
<body>

    <h2>Gap 即時拉霸調整器</h2>

    <div class="controls">
        <div class="control-group">
            <label>水平間距 (Column): <span id="col-val">20</span>px</label>
            <input type="range" id="col-slider" min="0" max="100" value="20">
        </div>
        <div class="control-group">
            <label>垂直間距 (Row): <span id="row-val">20</span>px</label>
            <input type="range" id="row-slider" min="0" max="100" value="20">
        </div>
    </div>

    <div class="preview-container" id="preview">
        <div class="box">1</div><div class="box">2</div><div class="box">3</div>
        <div class="box">4</div><div class="box">5</div><div class="box">6</div>
    </div>

    <script>
        const preview = document.getElementById('preview');
        const colSlider = document.getElementById('col-slider');
        const rowSlider = document.getElementById('row-slider');
        const colVal = document.getElementById('col-val');
        const rowVal = document.getElementById('row-val');

        // 監聽水平拉霸
        colSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            preview.style.columnGap = val + 'px';
            colVal.textContent = val;
        });

        // 監聽垂直拉霸
        rowSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            preview.style.rowGap = val + 'px';
            rowVal.textContent = val;
        });
    </script>

</body>
</html>
