<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行政計畫管理系統 - 專業修復版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --ly-blue: #003153; --ly-gold: #b8860b; --bg-gray: #f2f4f7; --border-color: #dee2e6; --warning-yellow: #ffeb3b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { max-width: 100%; overflow-x: hidden; margin: 0; padding: 0; background-color: var(--bg-gray); font-family: "Noto Sans TC", sans-serif; }
        .container { width: 100%; max-width: 850px; margin: 0 auto; padding: 10px; }

        /* 導覽列 */
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--ly-blue); color: white; padding: 10px 15px; margin-bottom: 15px; border-radius: 12px; }
        .logout-icon-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 10px; cursor: pointer; font-size: 14px; border-radius: 8px; }

        /* 編輯器容器 */
        .collapse-card { background: white; border: 1px solid var(--border-color); margin-bottom: 20px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .collapse-header { padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .header-text-group h2 { margin: 0; font-size: 0.9rem; color: var(--ly-blue); font-weight: 700; }
        .header-text-group p { margin: 2px 0 0 0; font-size: 11px; color: #888; }
        .collapse-content { display: none; padding: 10px 15px; border-top: 1px solid #eee; }

        input, textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); font-size: 14px; outline: none; border-radius: 8px; margin-bottom: 5px; }
        
        /* 區塊與拖拽 */
        .dynamic-section { background: #fdfdfd; border: 1px solid #eee; padding: 8px 12px 8px 35px; margin-top: 5px; position: relative; border-radius: 10px; }
        .inner-drag-handle { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #333; cursor: grab; font-size: 20px; touch-action: none; padding: 5px; z-index: 10; }
        .section-ctrl { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 3px; }
        .ctrl-btn { cursor: pointer; font-size: 11px; color: var(--ly-blue); font-weight: bold; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin: 5px 0; }
        .add-btn { padding: 6px; border: 1px solid var(--ly-blue); background: white; color: var(--ly-blue); cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 11px; }
        .save-btn { background: var(--ly-blue); color: white; border: none; padding: 10px; cursor: pointer; width: 100%; font-size: 14px; font-weight: bold; border-radius: 8px; margin-top: 5px; }

        /* 貼文內容 */
        .feed-item { background: white; border: 1px solid var(--border-color); padding: 10px 12px; margin-bottom: 10px; border-radius: 12px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .feed-header-flex { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .feed-meta { font-size: 10px; color: #888; }
        .feed-time-tag { font-size: 10px; color: #bbb; }
        .drag-handle { color: #333; text-align: center; font-size: 18px; margin-bottom: 2px; cursor: grab; width: 100%; padding: 6px 0; touch-action: none; }
        
        .feed-title { font-size: 1.1rem; font-weight: bold; color: #111; border-left: 5px solid var(--ly-gold); padding-left: 10px; margin: 0 0 8px 0; }
        .item-row { padding: 5px 8px; margin-bottom: 3px; background: #fafafa; border-radius: 6px; }
        .inner-heading { font-size: 1.05rem; font-weight: 600; color: var(--ly-blue); margin: 2px 0 6px 0; display: block; position: relative; padding-bottom: 3px; }
        .inner-heading::after { content: ""; position: absolute; bottom: 0; left: 0; width: 50%; height: 2px; background: linear-gradient(to right, var(--ly-blue) 0%, transparent 100%); }
        .warning-box { background-color: var(--warning-yellow); color: #333; border: 2.5px solid #333; padding: 8px 12px; border-radius: 6px; font-weight: 700; font-size: 12.5px; margin: 2px 0; display: block; box-shadow: 2px 2px 0px #333; white-space: pre-wrap; }
        .warning-box i { color: #d32f2f; margin-right: 8px; font-size: 14px; }
        
        .flight-tags-container { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-bottom: 2px; }
        .base-tag { display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 10.5px; height: 22px; padding: 0 8px; border-radius: 4px; border: 1.5px solid; }
        .time-tag { color: #ffffff; background: #455a64; border-color: #37474f; }
        .flight-info-tag { color: #212121; background: #ffc107; border-color: #333; }
        .route-tag { color: #003153; background: #e0f2f1; border-color: #004d40; }

        .member-info-wrap { font-size: 10.5px; color: var(--ly-blue); font-weight: 600; margin-top: 3px; display: flex; gap: 5px; flex-wrap: wrap; }
        .member-tag { background: #fff; padding: 0px 5px; border-radius: 3px; border: 1px solid var(--ly-blue); }

        /* 原地編輯 */
        .inline-edit-area { border: 2px dashed var(--ly-blue); padding: 12px; border-radius: 10px; background: #f9fbff; margin-top: 10px; }
        .inline-footer { display: flex; justify-content: flex-end; align-items: center; margin-top: 12px; gap: 8px; }
        .post-footer { display: flex; justify-content: flex-end; margin-top: 8px; border-top: 1px solid #f0f0f0; padding-top: 6px; gap: 10px; }
        .edit-link { padding: 4px 12px; border: 1px solid var(--ly-blue); color: var(--ly-blue); font-size: 10.5px; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 6px; cursor: pointer; font-weight: bold; border: 1px solid transparent; }
        .btn-delete { color: #a94442; border-color: #a94442; background: white; }
        .btn-cancel { color: #555; background: #eee; border: none; }
        .btn-update { color: white; background: var(--ly-blue); border: none; }
/* 導覽列左側排版 */
.header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* 回上頁按鈕樣式 */
.back-icon-btn {
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.2s;
}

.back-icon-btn:hover {
    background: rgba(255, 255, 255, 0.25);
}

/* 調整原本登出按鈕的小細節，使其高度一致 */
.logout-icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 32px;
}

        @media (max-width: 600px) {
            .container { padding: 8px; }
            .action-btns { grid-template-columns: 1fr; }
            .header, .feed-item, .collapse-card { border-radius: 10px; margin-left: 2px; margin-right: 2px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <button class="back-icon-btn" onclick="window.location.href='Dashboard.html'">
                <i class="fas fa-chevron-left"></i> 回上頁
            </button>
            <span><i class="fas fa-clipboard-check"></i> <strong>行政計畫系統</strong></span>
        </div>
        <button class="logout-icon-btn" onclick="confirmLogout()"><i class="fas fa-power-off"></i></button>
    </div>

    <div class="collapse-card" id="top-creator-card">
        <div class="collapse-header" onclick="toggleEditArea()">
            <div class="header-text-group">
                <h2>發布新計畫</h2>
                <p>點擊展開以建立新的內容</p>
            </div>
            <i id="chevron-icon" class="fas fa-chevron-down" style="font-size: 12px; color: #ccc;"></i>
        </div>
        <div id="edit-area" class="collapse-content">
            <input type="text" id="mainTitle" placeholder="計畫主標題">
            <div id="dynamic-container"></div>
            <div class="action-btns">
                <button class="add-btn" onclick="addSection('heading', {}, 'dynamic-container')">+ 大標題</button>
                <button class="add-btn" onclick="addSection('content', {}, 'dynamic-container')">+ 內容資訊</button>
                <button class="add-btn" onclick="addSection('flight', {}, 'dynamic-container')">+ 航班資訊</button>
                <button class="add-btn" style="border-color:#d32f2f; color:#d32f2f;" onclick="addSection('warning', {}, 'dynamic-container')">+ 注意事項</button>
            </div>
            <button class="save-btn" onclick="handleSave()">發佈內容</button>
        </div>
    </div>

    <div id="feed-container">讀取資料中...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACnoimIASfb1rb59SbgLDkUmyYR6ODbUU",
        authDomain: "llwb-ed686.firebaseapp.com",
        projectId: "llwb-ed686",
        storageBucket: "llwb-ed686.firebasestorage.app",
        messagingSenderId: "940345852074",
        appId: "1:940345852074:web:7a30cca5a6d997a92350d3"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let sortableFeedInstance = null;
    let sortableEditorInstances = {}; // 儲存多個編輯器的實例
    let activeEditId = null;

    auth.onAuthStateChanged(user => { if (user) startListening(); else window.location.href = "login.html"; });

    function confirmLogout() { if (confirm("確定登出系統？")) auth.signOut().then(() => window.location.href = "login.html"); }

    function toggleEditArea(forceClose = false) {
        const area = document.getElementById('edit-area');
        const icon = document.getElementById('chevron-icon');
        const isOpening = !forceClose && area.style.display !== "block";
        
        if (forceClose || !isOpening) {
            clearContainer('mainTitle', 'dynamic-container');
            area.style.display = "none";
            icon.className = "fas fa-chevron-down";
        } else {
            area.style.display = "block";
            icon.className = "fas fa-chevron-up";
            refreshEditorSortable('dynamic-container');
        }
    }

    function clearContainer(titleId, containerId) {
        document.getElementById(titleId).value = "";
        document.getElementById(containerId).innerHTML = "";
    }

    function addSection(type, data = {}, containerId) {
        const container = document.getElementById(containerId);
        const div = document.createElement('div');
        div.className = 'dynamic-section';
        div.dataset.type = type;
        const ctrls = `<div class="inner-drag-handle"><i class="fas fa-grip-vertical"></i></div><div class="section-ctrl">
                <span class="ctrl-btn" onclick="this.parentElement.parentElement.previousElementSibling?.before(this.parentElement.parentElement)">上移</span>
                <span class="ctrl-btn" onclick="this.parentElement.parentElement.nextElementSibling?.after(this.parentElement.parentElement)">下移</span>
                <span class="ctrl-btn" style="color:#d9534f" onclick="this.parentElement.parentElement.remove()">移除</span>
            </div>`;

        if (type === 'heading') {
            div.innerHTML = `${ctrls}<input type="text" class="sec-text" placeholder="標題..." value="${data.text || ''}" style="font-weight:600; border:none; background:transparent; border-bottom: 2px solid var(--ly-gold); border-radius: 0; padding-left: 0;">`;
        } else if (type === 'warning') {
            div.innerHTML = `${ctrls}<textarea class="sec-text" rows="2" placeholder="注意事項..." style="background:#fffde7; border:1.5px solid #333; font-weight:bold;">${data.text || ''}</textarea>`;
        } else if (type === 'content') {
            div.innerHTML = `${ctrls}<textarea class="sec-text" rows="3" placeholder="內容...">${data.text || ''}</textarea>`;
        } else {
            div.innerHTML = `${ctrls}
                <div style="display:flex; gap:5px; margin-bottom:5px;">
                    <input type="date" class="sec-date" value="${data.date || ''}" style="flex:1">
                    <input type="time" class="sec-time" value="${data.time || ''}" style="flex:1">
                </div>
                <div style="display:flex; gap:5px; margin-bottom:5px;">
                    <input type="text" class="sec-from" value="${data.from || ''}" placeholder="起飛" style="flex:1">
                    <input type="text" class="sec-to" value="${data.to || ''}" placeholder="降落" style="flex:1">
                </div>
                <div style="display:flex; gap:5px; margin-bottom:5px;">
                    <input type="text" class="sec-member" value="${data.member || ''}" placeholder="成員" style="flex:1">
                    <input type="text" class="sec-buddy" value="${data.buddy || ''}" placeholder="同行" style="flex:1">
                </div>
                <input type="text" class="sec-text" value="${data.text || ''}" placeholder="航班資訊內容">`;
        }
        container.appendChild(div);
        refreshEditorSortable(containerId);
    }

    // --- 強化修復：確保排序功能回歸 ---
    function refreshEditorSortable(containerId) {
        const el = document.getElementById(containerId);
        if (!el) return;
        
        // 銷毀舊實例防止衝突
        if (sortableEditorInstances[containerId]) {
            sortableEditorInstances[containerId].destroy();
        }

        sortableEditorInstances[containerId] = Sortable.create(el, { 
            animation: 150, 
            handle: '.inner-drag-handle', 
            ghostClass: 'sortable-ghost',
            forceFallback: true,
            fallbackOnBody: true,
            swapThreshold: 0.65
        });
    }

    async function handleSave() {
        const title = document.getElementById('mainTitle').value.trim();
        const sections = document.querySelectorAll('#dynamic-container .dynamic-section');
        if (!title || sections.length === 0) return alert("內容不完整");
        const items = Array.from(sections).map(extractSectionData);
        await db.collection("post").add({
            user: auth.currentUser.email, title, items,
            orderIndex: Date.now(), timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        toggleEditArea(true); // 自動摺疊
    }

    function extractSectionData(sec) {
        return {
            type: sec.dataset.type,
            date: sec.querySelector('.sec-date')?.value || "",
            time: sec.querySelector('.sec-time')?.value || "",
            from: sec.querySelector('.sec-from')?.value || "",
            to: sec.querySelector('.sec-to')?.value || "",
            member: sec.querySelector('.sec-member')?.value || "",
            buddy: sec.querySelector('.sec-buddy')?.value || "",
            text: sec.querySelector('.sec-text').value
        };
    }

    async function startInlineEdit(id) {
        if (activeEditId && activeEditId !== id) { startListening(); }
        activeEditId = id;
        const doc = await db.collection("post").doc(id).get();
        const data = doc.data();
        const card = document.querySelector(`.feed-item[data-id="${id}"]`);
        card.querySelector('.post-content-body').style.display = "none";
        card.querySelector('.post-footer').style.display = "none";
        
        const editDiv = document.createElement('div');
        editDiv.className = "inline-edit-area";
        editDiv.innerHTML = `
            <input type="text" id="inline-title-${id}" value="${data.title}" placeholder="標題">
            <div id="inline-container-${id}"></div>
            <div class="action-btns">
                <button class="add-btn" onclick="addSection('heading', {}, 'inline-container-${id}')">+ 大標題</button>
                <button class="add-btn" onclick="addSection('content', {}, 'inline-container-${id}')">+ 內容資訊</button>
                <button class="add-btn" onclick="addSection('flight', {}, 'inline-container-${id}')">+ 航班資訊</button>
                <button class="add-btn" style="border-color:#d32f2f; color:#d32f2f;" onclick="addSection('warning', {}, 'inline-container-${id}')">+ 注意事項</button>
            </div>
            <div class="inline-footer">
                <button class="btn-sm btn-delete" onclick="deletePost('${id}')">永久刪除</button>
                <button class="btn-sm btn-cancel" onclick="confirmCancelInline()">取消修改</button>
                <button class="btn-sm btn-update" onclick="updateInlinePost('${id}')">更新存檔</button>
            </div>
        `;
        card.appendChild(editDiv);
        data.items.forEach(item => addSection(item.type, item, `inline-container-${id}`));
        refreshEditorSortable(`inline-container-${id}`); // 啟動原地編輯排序
    }

    function confirmCancelInline() { 
        if (confirm("現有編輯內容尚未儲存，是否捨棄？")) { 
            activeEditId = null; 
            startListening(); 
            toggleEditArea(true); // 自動摺疊頂部
        } 
    }

    async function updateInlinePost(id) {
        const title = document.getElementById(`inline-title-${id}`).value.trim();
        const sections = document.querySelectorAll(`#inline-container-${id} .dynamic-section`);
        if (!title || sections.length === 0) return alert("不可為空");
        const items = Array.from(sections).map(extractSectionData);
        await db.collection("post").doc(id).update({ title, items });
        activeEditId = null;
        startListening();
        toggleEditArea(true); // 自動摺疊
    }

    // 定義擁有特殊權限的 VIP 清單
    const vipUsers = [
        "momoe@gmail.com",
        "wu@ll.com",
        "nina@shiba.com",
        "momo@h.com"
    ];

    function startListening() {
        activeEditId = null;
        const currentUserEmail = auth.currentUser.email;
        const isVip = vipUsers.includes(currentUserEmail);

        db.collection("post").orderBy("orderIndex", "desc").onSnapshot(snapshot => {
            if (activeEditId) return;
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            
            snapshot.forEach(doc => {
                const data = doc.data();
                const postAuthor = data.user;

                // --- 權限判斷邏輯 ---
                // 1. 如果我是 VIP，我可以看到所有人的貼文
                // 2. 如果我不是 VIP，我只能看到非 VIP 發布的貼文 (隱藏 VIP 的貼文)
                if (!isVip && vipUsers.includes(postAuthor)) {
                    return; // 跳過不顯示這則貼文
                }

                const publishDate = data.timestamp ? data.timestamp.toDate() : new Date();
                const timeStr = `${publishDate.toLocaleDateString()} ${publishDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
                
                const itemHtml = data.items.map(i => {
                    let memberSection = (i.type === 'flight' && (i.member || i.buddy)) ? `<div class="member-info-wrap">${i.member ? `<span class="member-tag">成員: ${i.member}</span>` : ""}${i.buddy ? `<span class="member-tag">同行: ${i.buddy}</span>` : ""}</div>` : "";
                    let routeSection = (i.type === 'flight' && (i.from || i.to)) ? `<span class="base-tag route-tag">${i.from} <i class="fas fa-arrow-right" style="font-size:9px"></i> ${i.to}</span>` : "";
                    if (i.type === 'heading') return `<div class="item-row" style="background:transparent;"><div class="inner-heading">${i.text}</div></div>`;
                    if (i.type === 'warning') return `<div class="item-row" style="background:transparent; padding:2px 0;"><div class="warning-box"><i class="fas fa-exclamation-triangle"></i>${i.text}</div></div>`;
                    if (i.type === 'flight') return `<div class="item-row"><div class="flight-tags-container"><span class="base-tag time-tag"><i class="far fa-clock"></i>&nbsp;${i.date} ${i.time}</span>${routeSection}<span class="base-tag flight-info-tag"><i class="fas fa-plane"></i>&nbsp;${i.text}</span></div>${memberSection}</div>`;
                    return `<div class="item-row"><p style="margin:0; white-space:pre-wrap; font-size:13.5px; color:#444;">${i.text}</p></div>`;
                }).join("");

                container.innerHTML += `
                    <div class="feed-item" data-id="${doc.id}">
                        <div class="drag-handle"><i class="fas fa-grip-lines"></i></div>
                        <div class="feed-header-flex"><div class="feed-meta">發布人：${data.user}</div><div class="feed-time-tag">${timeStr}</div></div>
                        <div class="feed-title">${data.title}</div>
                        <div class="post-content-body">${itemHtml}</div>
                        <div class="post-footer"><div class="edit-link" onclick="startInlineEdit('${doc.id}')">編輯計畫</div></div>
                    </div>
                `;
            });
            initFeedSortableRebind(); 
        });
    }

    function initFeedSortableRebind() {
        const el = document.getElementById('feed-container');
        if (sortableFeedInstance) sortableFeedInstance.destroy();
        sortableFeedInstance = Sortable.create(el, {
            animation: 150, handle: '.drag-handle', ghostClass: 'sortable-ghost',
            forceFallback: true,
            onEnd: async function() {
                const items = document.querySelectorAll('.feed-item');
                const batch = db.batch();
                let newIndex = Date.now();
                items.forEach((item) => { batch.update(db.collection("post").doc(item.dataset.id), { orderIndex: newIndex }); newIndex -= 1000; });
                await batch.commit();
            }
        });
    }

    async function deletePost(id) { 
        if (confirm("永久移除貼文？")) { 
            await db.collection("post").doc(id).delete(); 
            activeEditId = null; 
            startListening(); 
            toggleEditArea(true); // 自動摺疊頂部新增器
        } 
    }
</script>
</body>
</html>
